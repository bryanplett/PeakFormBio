const categorize = (label) => {
  const lower = label.toLowerCase();
  for (const cat of CATEGORY_MAP) {
    for (const m of cat.matches) {
      if (lower.includes(m)) {
        // Find matching blurb (longest match wins)
        let blurb = '';
        for (const key of Object.keys(cat.blurbs)) {
          if (lower.includes(key) && key.length > 0) blurb = cat.blurbs[key];
        }
        return { categoryId: cat.id, blurb };
      }
    }
  }
  return { categoryId: 'other', blurb: '' };
};

// Parse "Name — Strength — $Price" into parts.
// IMPORTANT: split only on em/en dashes — hyphens are part of names like
// "Semax-Selank Blend", "PT-141", "TB-500", "SS-31".
const parseLabel = (label) => {
  // Strip the price segment first so it isn't mistaken for a strength.
  const priceMatch = label.match(/\$[\d,.]+/);
  const price = priceMatch ? priceMatch[0] : '';
  const withoutPrice = price ? label.replace(price, '').replace(/[—–]\s*$/, '').trim() : label;
  const parts = withoutPrice.split(/[—–]/).map(s => s.trim()).filter(Boolean);
  return {
    name: parts[0] || label,
    strength: parts[1] || '',
    price,
    fullLabel: label,
  };
};

  { match: 'semax selank', src: 'assets/product-semax-selank.png' },

  { match: 'nutrition plan', src: 'assets/program-nutrition.png' },

const getProductPhoto = (label) => {
  if (!label) return null;
  const lower = label.toLowerCase();
  // longest match wins so 'cjc-1295 + ipamorelin' beats 'cjc'
  let best = null;
  for (const p of PRODUCT_PHOTOS) {
    if (lower.includes(p.match)) {
      if (!best || p.match.length > best.match.length) best = p;
    }
  }
  return best ? best.src : null;
};

const PortalRevealCard = ({ parsed, blurb, tint, isSelected, onSelect, onExpand, variants, selectedLabels = [], expanded = false }) => {
  // `variants` (optional): array of { parsed: {...}, blurb } for products that
  // share one card across multiple strengths (Semaglutide / Tirzepatide /
  // Retatrutide). When supplied, the card shows a strength selector and
  // adds the chosen variant — not `parsed.fullLabel` — to the cart.
  const hasVariants = Array.isArray(variants) && variants.length > 0;
  const [selectedIdx, setSelectedIdx] = React.useState(0);
  const activeVariant = hasVariants ? variants[selectedIdx] : null;
  const display = hasVariants ? activeVariant.parsed : parsed;
  const displayBlurb = hasVariants ? (activeVariant.blurb || blurb) : blurb;

  const [hover, setHover] = React.useState(false);
  const variantSelected = hasVariants && selectedLabels.includes(activeVariant.parsed.fullLabel);
  const anyVariantSelected = hasVariants && variants.some(v => selectedLabels.includes(v.parsed.fullLabel));
  const cardSelected = hasVariants ? anyVariantSelected : isSelected;
  const active = hover || cardSelected || expanded;

  const panelRef = React.useRef(null);
  const [panelHeight, setPanelHeight] = React.useState(0);

  // Measure the slide-up panel so we can offset it consistently across all cards.
  React.useLayoutEffect(() => {
    if (panelRef.current) {
      setPanelHeight(panelRef.current.scrollHeight);
    }
  }, [displayBlurb, display.name, display.strength, display.price, hasVariants, variants?.length]);

  // Fixed card height keeps proportions identical across all cards.
  const CARD_HEIGHT = expanded ? 600 : 460;
  // At rest only the product name peeks. On hover/click the rest of the panel
  // (strength, price, description, add-to-cart) slides up.
  const PEEK_HEIGHT = 76;
  const slideOffset = Math.max(panelHeight - PEEK_HEIGHT, 0);

  const handlePrimaryAction = () => {
    if (hasVariants) {
      onSelect(activeVariant.parsed.fullLabel);
    } else {
      onSelect(parsed.fullLabel);
    }
  };

  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onClick={(e) => {
        // Click expands the card to a focused, larger view. Adding to cart is
        // handled by the dedicated button (which calls stopPropagation).
        if (onExpand) onExpand();
      }}
      style={{
        position: 'relative',
        width: '100%', height: CARD_HEIGHT,
        borderRadius: 24,
        background: `linear-gradient(180deg, #1a1a1c 0%, #0f0f10 100%)`,
        border: `1px solid ${cardSelected ? tint : (hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)')}`,
        boxShadow: cardSelected ? `0 0 0 1px ${tint}, 0 12px 30px ${tint}33` : 'none',
        cursor: 'pointer', overflow: 'hidden',
        transition: 'border-color 0.3s, box-shadow 0.3s',
      }}>
      {/* Aura */}
      <div style={{
        position: 'absolute', inset: '20% 15%',
        background: `radial-gradient(circle, ${tint}55 0%, transparent 70%)`,
        opacity: active ? 0.7 : 0,
        transition: 'opacity 0.4s',
        filter: 'blur(20px)',
        pointerEvents: 'none',
      }} />
      {/* Vial / photo */}
      <div style={{
        position: 'absolute', top: '4%', left: '50%',
        transform: `translate(-50%, ${active ? '-20px' : '0'}) rotate(${active ? '-3deg' : '0deg'})`,
        transition: 'transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)',
      }}>
        {(() => {
          const photo = getProductPhoto(display.fullLabel);
          if (photo) {
            return (
              <img src={photo} alt={`${display.name} ${display.strength}`}
                style={{
                  width: 220, height: 220, objectFit: 'cover',
                  objectPosition: display.fullLabel.toLowerCase().includes('plan') || display.fullLabel.toLowerCase().includes('workout') ? '14% center' : '32% center',
                  borderRadius: 16, display: 'block',
                  filter: active ? 'brightness(1.05)' : 'brightness(0.95)',
                  transition: 'filter 0.4s',
                }}
              />
            );
          }
          return <PortalVial name={display.name} strength={display.strength} tint={tint} size={140} />;
        })()}
      </div>
      {/* Slide-up panel — measured & offset so all cards have identical proportions */}
      <div
        ref={panelRef}
        style={{
          position: 'absolute', left: 0, right: 0, bottom: 0,
          background: 'linear-gradient(180deg, rgba(20,20,22,0) 0%, rgba(20,20,22,0.96) 30%, rgba(20,20,22,1) 100%)',
          padding: '48px 22px 22px',
          transform: active ? 'translateY(0)' : `translateY(${slideOffset}px)`,
          transition: 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1)',
        }}>
        <h3 style={{
          fontSize: display.name.length > 22 ? 15 : (display.name.length > 17 ? 17 : 20),
          fontWeight: 600, color: '#f5f5f7', marginBottom: 6,
          letterSpacing: '-0.01em',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          lineHeight: 1.2,
        }}>{display.name}</h3>
        <div style={{
          display: 'flex', alignItems: 'center',
          marginBottom: 14, height: 22, gap: 8,
          opacity: active ? 1 : 0,
          transition: 'opacity 0.25s 0.05s',
        }}>
          <span style={{
            display: 'inline-block', padding: '2px 8px', borderRadius: 6,
            background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)',
            fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.7)',
            whiteSpace: 'nowrap', letterSpacing: 0.2,
          }}>{hasVariants ? `${variants.length} strengths` : (display.strength || '—')}</span>
          <span style={{ flex: 1 }} />
          <span style={{
            fontSize: 14, fontWeight: 700, color: tint, whiteSpace: 'nowrap',
            visibility: display.price ? 'visible' : 'hidden',
          }}>{display.price || '$0'}</span>
        </div>
        {displayBlurb && (
          <p style={{
            fontSize: 13, color: 'rgba(255,255,255,0.7)', lineHeight: 1.5, marginBottom: 14,
            opacity: active ? 1 : 0, transition: 'opacity 0.3s 0.15s',
          }}>{displayBlurb}</p>
        )}

        {hasVariants && (
          <div style={{
            opacity: active ? 1 : 0,
            transition: 'opacity 0.3s 0.15s',
            marginBottom: 14,
          }}>
            <p style={{
              fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.45)',
              letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 8,
            }}>Choose strength</p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {variants.map((v, i) => {
                const isThisSelected = i === selectedIdx;
                const isInCart = selectedLabels.includes(v.parsed.fullLabel);
                return (
                  <button
                    key={v.parsed.fullLabel}
                    onClick={(e) => { e.stopPropagation(); setSelectedIdx(i); }}
                    style={{
                      background: isThisSelected ? `${tint}22` : 'rgba(255,255,255,0.04)',
                      color: isThisSelected ? '#fff' : 'rgba(255,255,255,0.75)',
                      border: `1px solid ${isThisSelected ? tint : 'rgba(255,255,255,0.10)'}`,
                      borderRadius: 8, padding: '5px 10px',
                      fontSize: 11, fontWeight: 600, cursor: 'pointer',
                      fontFamily: 'inherit', letterSpacing: 0.2,
                      transition: 'all 0.15s',
                      position: 'relative',
                    }}>
                    {v.parsed.strength || '—'}
                    {isInCart && (
                      <span style={{
                        position: 'absolute', top: -4, right: -4,
                        width: 10, height: 10, borderRadius: '50%',
                        background: tint, border: '1.5px solid #1a1a1c',
                      }} />
                    )}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        <button
          onClick={(e) => { e.stopPropagation(); handlePrimaryAction(); }}
          style={{
            background: (hasVariants ? variantSelected : isSelected) ? tint : 'transparent',
            color: (hasVariants ? variantSelected : isSelected) ? '#000' : '#fff',
            border: (hasVariants ? variantSelected : isSelected) ? `1px solid ${tint}` : '1px solid rgba(255,255,255,0.25)',
            borderRadius: 980, padding: '7px 16px',
            fontSize: 12, fontWeight: 500, cursor: 'pointer',
            opacity: active ? 1 : 0, transition: 'opacity 0.3s 0.2s, background 0.2s',
            fontFamily: 'inherit',
          }}>
          {(hasVariants ? variantSelected : isSelected) ? '✓ Added' : 'Add to cart'}
        </button>
      </div>
    </div>
  );
};

const PortalCatalog = ({ productOptions, selectedLabels = [], onSelect }) => {
  const [expandedKey, setExpandedKey] = React.useState(null);

  // Close on Esc.
  React.useEffect(() => {
    if (!expandedKey) return;
    const onKey = (e) => { if (e.key === 'Escape') setExpandedKey(null); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [expandedKey]);
  // Group products into categories
  const grouped = React.useMemo(() => {
    const buckets = {};
    CATEGORY_MAP.forEach(c => { buckets[c.id] = { ...c, items: [] }; });
    buckets.other = { id: 'other', title: 'Other', tint: '#a1a1aa', items: [] };

    productOptions.forEach(label => {
      const { categoryId, blurb } = categorize(label);
      const parsed = parseLabel(label);
      buckets[categoryId].items.push({ parsed, blurb });
    });

    // Auto-collapse: any product with 2+ strengths under the same name becomes
    // a single card with a strength selector at the bottom. Catches Sema /
    // Tirz / Reta as well as SS-31, MOTS, HGH, etc.
    const mgValue = (it) => {
      const m = it.parsed.strength && it.parsed.strength.match(/(\d+(?:\.\d+)?)/);
      return m ? parseFloat(m[1]) : 0;
    };
    Object.values(buckets).forEach(bucket => {
      const byName = {};
      bucket.items.forEach(it => {
        const key = it.parsed.name.toLowerCase().trim();
        (byName[key] = byName[key] || []).push(it);
      });
      const collapsed = [];
      bucket.items.forEach(it => {
        const key = it.parsed.name.toLowerCase().trim();
        const group = byName[key];
        if (!group) return; // already emitted
        if (group.length > 1) {
          group.sort((a, b) => mgValue(a) - mgValue(b));
          const head = group[0];
          collapsed.push({ parsed: head.parsed, blurb: head.blurb, variants: group });
        } else {
          collapsed.push(group[0]);
        }
        delete byName[key];
      });
      bucket.items = collapsed;
    });

    if (buckets.metabolic) {
      // Within Metabolic / Weight Management, surface Semaglutide → Tirzepatide
      // → Retatrutide first (in that order), before 5 Amino, Cagrilintide, KLOW.
      const priority = ['semaglutide', 'tirzepatide', 'retatrutide'];
      const rank = (item) => {
        const lower = item.parsed.fullLabel.toLowerCase();
        const idx = priority.findIndex(p => lower.includes(p));
        return idx === -1 ? 999 : idx;
      };
      buckets.metabolic.items.sort((a, b) => rank(a) - rank(b));
    }

    return Object.values(buckets).filter(b => b.items.length > 0);
  }, [productOptions]);

  return (
    <div>
      {grouped.map(cat => (
        <div key={cat.id} style={{ marginBottom: 44 }}>
          <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              width: 5, height: 22, borderRadius: 3, background: cat.tint,
              boxShadow: `0 0 14px ${cat.tint}80`,
            }} />
            <h3 style={{ fontSize: 18, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.01em' }}>{cat.title}</h3>
            <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>· {cat.items.length}</span>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))',
            gap: 20,
          }}>
            {cat.items.map(({ parsed, blurb, variants }) => (
              <PortalRevealCard
                key={parsed.fullLabel}
                parsed={parsed}
                blurb={blurb}
                tint={cat.tint}
                variants={variants}
                selectedLabels={selectedLabels}
                isSelected={selectedLabels.includes(parsed.fullLabel)}
                onSelect={onSelect}
                onExpand={() => setExpandedKey(parsed.fullLabel)}
              />
            ))}
          </div>
        </div>
      ))}

      {expandedKey && (() => {
        // Find the item across all buckets.
        let found = null, foundCat = null;
        for (const cat of grouped) {
          const it = cat.items.find(i => i.parsed.fullLabel === expandedKey);
          if (it) { found = it; foundCat = cat; break; }
        }
        if (!found) return null;
        return (
          <div
            onClick={() => setExpandedKey(null)}
            style={{
              position: 'fixed', inset: 0, zIndex: 200,
              background: 'rgba(0,0,0,0.72)', backdropFilter: 'blur(8px)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: 24, animation: 'fadeIn 0.18s ease',
            }}>
            <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 440, position: 'relative' }}>
              <button
                onClick={() => setExpandedKey(null)}
                aria-label="Close"
                style={{
                  position: 'absolute', top: -44, right: 0,
                  width: 36, height: 36, borderRadius: '50%',
                  background: 'rgba(255,255,255,0.10)', border: '1px solid rgba(255,255,255,0.15)',
                  color: '#fff', cursor: 'pointer', fontSize: 18, lineHeight: 1,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontFamily: 'inherit',
                }}>✕</button>
              <PortalRevealCard
                parsed={found.parsed}
                blurb={found.blurb}
                tint={foundCat.tint}
                variants={found.variants}
                selectedLabels={selectedLabels}
                isSelected={selectedLabels.includes(found.parsed.fullLabel)}
                onSelect={onSelect}
                expanded={true}
              />
            </div>
          </div>
        );
      })()}
    </div>
  );
};

function CatalogPreview() {
  const [cart, setCart] = React.useState([]);
  // Mirrors the real OrderForm: show every product on the pricelist.
  const productOptions = React.useMemo(() => window.getPricelistAsLabels('standard'), []);
  const addToCart = (label) =>
    setCart(c => c.includes(label) ? c.filter(x => x !== label) : [...c, label]);
  return <PortalCatalog productOptions={productOptions} selectedLabels={cart} onSelect={addToCart} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<CatalogPreview />);
</script>
</body>
