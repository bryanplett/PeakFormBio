<script type="text/babel">

/* ══════════════════════════════════════════════════════════════════
 * PRODUCT — update per cycle
 * ══════════════════════════════════════════════════════════════════ */
const PRODUCT = {
  name:        'Retatrutide',
  subtitle:    '10-Vial Kit · 5mg / vial',
  desc:        'Research-grade. Priority shipping on every order.',
  priceEarly:  85,   // pre-test-results price
  priceFull:   90,   // post-test-results price
  shipping:    15,
  maxPerOrder: 10,
};

/* Defaults — overridden by Admin → Group Buy settings (localStorage) */
const GB_DEFAULTS = {
  password:      'PFBVIP2026',
  testResultsIn: false,
  openDate:      '2026-07-01',
  closeDate:     '2026-07-10',
};
/* ════════════════════════════════════════════════════════════════ */

const { useState, useEffect, useRef } = React;

function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('pfb_gb_settings') || '{}');
    return { ...GB_DEFAULTS, ...s };
  } catch { return { ...GB_DEFAULTS }; }
}

// ─── Countdown ────────────────────────────────────────────────────────────────
function useCountdown(isoDateStr) {
  const target = new Date(isoDateStr + 'T23:59:59').getTime();
  const calc = () => {
    const diff = target - Date.now();
    if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, expired: true };
    return { d: Math.floor(diff / 86400000), h: Math.floor((diff % 86400000) / 3600000),
             m: Math.floor((diff % 3600000) / 60000), s: Math.floor((diff % 60000) / 1000), expired: false };
  };
  const [t, setT] = useState(calc);
  useEffect(() => { const id = setInterval(() => setT(calc()), 1000); return () => clearInterval(id); }, [isoDateStr]);
  return t;
}

// ─── Password Gate ────────────────────────────────────────────────────────────
function PasswordGate({ onAuth }) {
  const [val, setVal] = useState('');
  const [err, setErr] = useState(false);
  const [shaking, setShaking] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    const settings = getSettings();
    if (val.trim().toUpperCase() === settings.password.toUpperCase()) {
      sessionStorage.setItem('pfb_gb_auth', '1');
      onAuth();
    } else {
      setErr(true);
      setShaking(true);
      setTimeout(() => setShaking(false), 400);
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center',
      justifyContent: 'center', background: '#0a0a0a', padding: 24 }}>
      <form onSubmit={submit} style={{ width: '100%', maxWidth: 360, textAlign: 'center' }}
        className={shaking ? 'shake' : ''}>
        <img src="../1_5058098532557259934/PNG/VV/Asset 1@4x.png" alt="PeakForm Bio"
          style={{ width: 160, marginBottom: 44 }} />
        <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase',
          color: '#2997ff', marginBottom: 10 }}>Vendor Access Only</p>
        <h1 style={{ fontSize: 26, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.02em', marginBottom: 8 }}>
          Group Buy
        </h1>
        <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.4)', marginBottom: 32, lineHeight: 1.5 }}>
          Enter your access code to continue.
        </p>
        <input className="form-input" type="password" placeholder="Access code" value={val} autoFocus
          onChange={(e) => { setVal(e.target.value); setErr(false); }}
          style={{ textAlign: 'center', fontSize: 18, letterSpacing: '0.08em', marginBottom: err ? 10 : 20,
            borderColor: err ? 'rgba(255,69,58,0.7)' : undefined,
            boxShadow: err ? '0 0 0 3px rgba(255,69,58,0.14)' : undefined }} />
        {err && <p style={{ fontSize: 13, color: '#ff453a', marginBottom: 14 }}>Incorrect code.</p>}
        <button className="btn-primary" type="submit" style={{ width: '100%', padding: '15px' }}>
          Continue
        </button>
      </form>
    </div>
  );
}

// ─── Countdown Block ──────────────────────────────────────────────────────────
function CountdownBlock({ closeDate }) {
  const { d, h, m, s, expired } = useCountdown(closeDate);
  if (expired) return null;
  return (
    <div style={{ display: 'inline-flex', gap: 0, alignItems: 'center' }}>
      {[['Days', d], ['Hrs', h], ['Min', m], ['Sec', s]].map(([label, val], i) => (
        <React.Fragment key={label}>
          {i > 0 && <span style={{ fontSize: 20, color: 'rgba(255,255,255,0.2)', margin: '0 4px', lineHeight: 1, paddingBottom: 14 }}>:</span>}
          <div style={{ textAlign: 'center', minWidth: 52 }}>
            <div style={{ fontSize: 32, fontWeight: 700, color: '#fff', letterSpacing: '-0.03em', lineHeight: 1 }}>
              {String(val).padStart(2, '0')}
            </div>
            <div style={{ fontSize: 9, fontWeight: 600, color: 'rgba(255,255,255,0.35)',
              letterSpacing: '0.12em', textTransform: 'uppercase', marginTop: 5 }}>{label}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── Method Selector ──────────────────────────────────────────────────────────
function MethodSelector({ methods, chosen, onChange }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {methods.map((m) => (
        <button key={m.id} type="button" onClick={() => onChange(m.id)} style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '14px 16px', borderRadius: 12, cursor: 'pointer', textAlign: 'left',
          border: `1px solid ${chosen === m.id ? 'rgba(41,151,255,0.6)' : 'rgba(255,255,255,0.09)'}`,
          background: chosen === m.id ? 'rgba(41,151,255,0.08)' : 'rgba(255,255,255,0.03)',
          fontFamily: 'inherit', transition: 'all 0.15s',
        }}>
          <div style={{ width: 18, height: 18, borderRadius: '50%', flexShrink: 0,
            border: `2px solid ${chosen === m.id ? '#2997ff' : 'rgba(255,255,255,0.25)'}`,
            background: chosen === m.id ? '#2997ff' : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            {chosen === m.id && <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#fff' }} />}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 15, fontWeight: 500, color: '#f5f5f7' }}>{m.label}</span>
              {m.network && <span style={{ fontSize: 11, color: '#ff9f0a', background: 'rgba(255,159,10,0.12)',
                border: '1px solid rgba(255,159,10,0.25)', borderRadius: 999, padding: '2px 8px', fontWeight: 600 }}>{m.network}</span>}
            </div>
            {m.hint && <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>{m.hint}</div>}
          </div>
        </button>
      ))}
    </div>
  );
}

// ─── Group Buy Page ───────────────────────────────────────────────────────────
function GroupBuyPage() {
  const settings = getSettings();
  const now = new Date();
  const openDate = new Date(settings.openDate + 'T00:00:00');
  const closeDate = new Date(settings.closeDate + 'T23:59:59');
  const isOpen = now >= openDate && now <= closeDate;
  const isClosed = now > closeDate;
  const notYet = now < openDate;

  const price = settings.testResultsIn ? PRODUCT.priceFull : PRODUCT.priceEarly;

  const [step, setStep] = useState(() => Number(sessionStorage.getItem('pfb_gb_step') || 1));
  const [form, setForm] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem('pfb_gb_form') || '{"name":"","email":"","qty":1}'); }
    catch { return { name: '', email: '', qty: 1 }; }
  });
  const [chosenMethod, setChosenMethod] = useState(() => sessionStorage.getItem('pfb_gb_method') || '');
  const [reported, setReported] = useState(() => sessionStorage.getItem('pfb_gb_reported') === '1');
  const [methods, setMethods] = useState([]);
  const [orderRef] = useState(() => {
    const saved = sessionStorage.getItem('pfb_gb_ref');
    if (saved) return saved;
    const ref = 'GB-' + Math.random().toString(36).slice(2, 7).toUpperCase();
    sessionStorage.setItem('pfb_gb_ref', ref);
    return ref;
  });

  useEffect(() => {
    const cfg = window.PFB_PAYMENT;
    const all = cfg ? window.visiblePaymentMethods(cfg.methods) : [];
    setMethods(all);
  }, []);

  const save = (s, f, m) => {
    sessionStorage.setItem('pfb_gb_step', s);
    sessionStorage.setItem('pfb_gb_form', JSON.stringify(f));
    if (m !== undefined) sessionStorage.setItem('pfb_gb_method', m);
  };

  const kitTotal = price * form.qty;
  const grandTotal = kitTotal + PRODUCT.shipping;

  const formatDate = (str) => new Date(str + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

  return (
    <div style={{ minHeight: '100vh', background: '#0a0a0a' }}>

      {/* Nav */}
      <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 500,
        background: 'rgba(0,0,0,0.88)', backdropFilter: 'blur(20px)',
        height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 28px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
        <img src="../1_5058098532557259934/PNG/VH/PFB_VH (7).png" alt="PeakForm Bio" style={{ height: 15 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.10em', textTransform: 'uppercase',
            color: '#2997ff', background: 'rgba(41,151,255,0.12)', border: '1px solid rgba(41,151,255,0.28)',
            borderRadius: 999, padding: '4px 10px' }}>Vendor Group Buy</span>
        </div>
      </nav>

      {/* Hero */}
      <div style={{ position: 'relative', paddingTop: 52, minHeight: 520,
        display: 'flex', alignItems: 'flex-end' }}>
        <img src="../uploads/istockphoto-470062516-612x612.jpg" alt=""
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%',
            objectFit: 'cover', objectPosition: 'center 30%' }} />
        <div style={{ position: 'absolute', inset: 0,
          background: 'linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.65) 55%, rgba(10,10,10,1) 100%)' }} />

        <div style={{ position: 'relative', zIndex: 2, width: '100%',
          maxWidth: 680, margin: '0 auto', padding: '0 24px 56px', textAlign: 'center' }}>

          {/* Status badge */}
          {isOpen && (
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginBottom: 20,

              borderRadius: 999, padding: '6px 14px' }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#30d158' }} />
              <span style={{ fontSize: 12, fontWeight: 600, color: '#30d158', letterSpacing: '0.06em' }}>
                OPEN · {formatDate(settings.openDate)} – {formatDate(settings.closeDate)}
              </span>
            </div>
          )}
          {isClosed && (
            <div style={{ display: 'inline-block', marginBottom: 20,
              background: 'rgba(255,69,58,0.12)', border: '1px solid rgba(255,69,58,0.32)',

                ${PRODUCT.priceEarly}

              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>pre-test results</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', color: 'rgba(255,255,255,0.2)', fontSize: 18 }}>→</div>
            <div style={{
              borderRadius: 16, padding: '14px 22px', textAlign: 'center',
              background: settings.testResultsIn ? 'rgba(41,151,255,0.14)' : 'rgba(255,255,255,0.05)',

                {settings.testResultsIn ? '✦ Active' : 'Standard'}
              </div>
              <div style={{ fontSize: 28, fontWeight: 700,
                color: settings.testResultsIn ? '#fff' : 'rgba(255,255,255,0.35)', letterSpacing: '-0.02em' }}>
                ${PRODUCT.priceFull}
              </div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>after test results</div>
            </div>
          </div>

          {/* Test status note */}
          {!settings.testResultsIn && (
            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.45)', marginBottom: 28, lineHeight: 1.55 }}>
              A sample has been sent for testing. Order before results return and lock in ${PRODUCT.priceEarly}/kit.
            </p>
          )}

          {/* Countdown */}
          {isOpen && (
            <div>
              <p style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase',
                color: 'rgba(255,255,255,0.3)', marginBottom: 10 }}>Closes in</p>
              <CountdownBlock closeDate={settings.closeDate} />
            </div>
          )}
        </div>
      </div>

      {/* Order section */}
      {isOpen ? (
        <div style={{ maxWidth: 520, margin: '0 auto', padding: '40px 20px 100px' }}>

          {/* Step bar */}
          <div style={{ display: 'flex', gap: 5, marginBottom: 32 }}>
            {[1, 2, 3].map((s) => (
              <div key={s} style={{ height: 3, flex: 1, borderRadius: 2,
                background: s <= step ? '#0066cc' : 'rgba(255,255,255,0.10)',
                transition: 'background 0.3s' }} />
            ))}
          </div>

          {/* ── Step 1: Order details ── */}
          {step === 1 && (
            <div className="fade-up">
              <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7',
                letterSpacing: '-0.02em', marginBottom: 6 }}>Your order</h2>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 24 }}>
                <div>

                    value={form.email} onChange={(e) => setForm(f => ({ ...f, email: e.target.value }))} />
                </div>

                  <label style={{ fontSize: 13, fontWeight: 600, color: 'rgba(255,255,255,0.65)',
                    display: 'block', marginBottom: 8 }}>Kits</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <button type="button" onClick={() => setForm(f => ({ ...f, qty: Math.max(1, f.qty - 1) }))}

                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit' }}>+</button>
                    <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)' }}>max {PRODUCT.maxPerOrder}</span>

                </div>

                borderRadius: 14, padding: '16px 18px', marginBottom: 24 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>{PRODUCT.name} × {form.qty}</span>
                  <span style={{ fontSize: 14, color: '#f5f5f7' }}>${kitTotal}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>Priority Shipping</span>
                  <span style={{ fontSize: 14, color: '#f5f5f7' }}>${PRODUCT.shipping}</span>
                </div>
                <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 10,
                  display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ fontSize: 15, fontWeight: 600, color: '#f5f5f7' }}>Total</span>
                  <span style={{ fontSize: 15, fontWeight: 700, color: '#fff' }}>${grandTotal}</span>
                </div>
              </div>

              <button className="btn-primary" disabled={!form.name || !form.email}
                onClick={() => { const n = 2; setStep(n); save(n, form, chosenMethod); }}
                style={{ width: '100%', padding: '16px', fontSize: 17 }}>
                Continue to Payment
              </button>
            </div>
          )}

          {/* ── Step 2: Payment method ── */}
          {step === 2 && (
            <div className="fade-up">
              <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7',
                letterSpacing: '-0.02em', marginBottom: 6 }}>Payment method</h2>
              <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginBottom: 24 }}>
                Ref: <code style={{ fontFamily: 'monospace', color: '#2997ff' }}>{orderRef}</code>
                <span style={{ marginLeft: 10, color: 'rgba(255,255,255,0.4)' }}>Total: ${grandTotal}</span>
              </p>
              <MethodSelector methods={methods} chosen={chosenMethod} onChange={setChosenMethod} />
              <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                <button className="btn-ghost" onClick={() => { setStep(1); save(1, form, chosenMethod); }}>Back</button>
                <button className="btn-primary" disabled={!chosenMethod}
                  onClick={() => { const n = 3; setStep(n); save(n, form, chosenMethod); }}
                  style={{ flex: 1, padding: '15px', fontSize: 16 }}>Continue</button>
              </div>
            </div>
          )}

          {/* ── Step 3: Payment instructions ── */}
          {step === 3 && (
            <div className="fade-up">
              <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7',
                letterSpacing: '-0.02em', marginBottom: 24 }}>Send payment</h2>
              <PaymentInstructions
                amountDue={grandTotal}
                reference={orderRef}
                methods={methods}
                chosenId={chosenMethod}
                reported={reported}
                onReported={() => { setReported(true); sessionStorage.setItem('pfb_gb_reported', '1'); }}
                businessName="PeakForm Bio"
              />
              {!reported && (
                <button className="btn-ghost" onClick={() => { setStep(2); save(2, form, chosenMethod); }}
                  style={{ marginTop: 14, width: '100%' }}>← Change payment method</button>
              )}
            </div>
          )}
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: '60px 24px 100px' }}>
          <p style={{ fontSize: 16, color: 'rgba(255,255,255,0.4)' }}>
            {isClosed ? 'This group buy has closed. Check back for the next cycle.' :
             `This group buy opens ${formatDate(settings.openDate)}.`}
          </p>
        </div>
      )}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('pfb_gb_auth') === '1');
  if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;
  return <GroupBuyPage />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
