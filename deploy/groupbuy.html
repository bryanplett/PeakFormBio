function useCountdown(isoDateStr) {
  const target = new Date(isoDateStr + 'T23:59:59').getTime();
  const calc = () => {
    const diff = target - Date.now();
    if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, expired: true };
    return {
      d: Math.floor(diff / 86400000),
      h: Math.floor((diff % 86400000) / 3600000),
      m: Math.floor((diff % 3600000) / 60000),
      s: Math.floor((diff % 60000) / 1000),
      expired: false
    };
  };
  const [t, setT] = useState(calc);
  useEffect(() => { const id = setInterval(() => setT(calc()), 1000); return () => clearInterval(id); }, [isoDateStr]);
  return t;
}

function PasswordGate({ onAuth }) {
  const [val, setVal] = useState('');
  const [err, setErr] = useState(false);
  const [shaking, setShaking] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    try {
      const r = await fetch('/api/public/groupbuy-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val.trim() }),
      });
      if (r.ok) {
        sessionStorage.setItem('pfb_gb_auth', '1');
        onAuth();
      } else {
        setErr(true);
        setShaking(true);
        setTimeout(() => setShaking(false), 400);
      }
    } catch (e) {
      setErr(true);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center',

function CountdownBlock({ closeDate }) {
  const { d, h, m, s, expired } = useCountdown(closeDate);
  if (expired) return null;
  return (
    <div style={{ display: 'inline-flex', gap: 0, alignItems: 'center' }}>
      {[['Days', d], ['Hrs', h], ['Min', m], ['Sec', s]].map(([label, val], i) => (
        <React.Fragment key={label}>
          {i > 0 && <span style={{ fontSize: 20, color: 'rgba(255,255,255,0.2)', margin: '0 4px', lineHeight: 1, paddingBottom: 14 }}>:</span>}
          <div style={{ textAlign: 'center', minWidth: 52 }}>
            <div style={{ fontSize: 32, fontWeight: 700, color: '#fff', letterSpacing: '-0.03em', lineHeight: 1 }}>
              {String(val).padStart(2, '0')}
            </div>
            <div style={{ fontSize: 9, fontWeight: 600, color: 'rgba(255,255,255,0.35)',
              letterSpacing: '0.12em', textTransform: 'uppercase', marginTop: 5 }}>{label}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

                  <label style={{ fontSize: 13, fontWeight: 600, color: 'rgba(255,255,255,0.65)', display: 'block', marginBottom: 8 }}>Kits</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <button type="button" onClick={() => setForm(f => Object.assign({}, f, { qty: Math.max(1, f.qty - 1) }))}
                      style={{ width: 40, height: 40, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.14)',
                        background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 22, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit' }}>-</button>
                    <span style={{ fontSize: 24, fontWeight: 700, color: '#fff', minWidth: 30, textAlign: 'center' }}>{form.qty}</span>
                    <button type="button" onClick={() => setForm(f => Object.assign({}, f, { qty: Math.min(PRODUCT.maxPerOrder, f.qty + 1) }))}
                      style={{ width: 40, height: 40, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.14)',
                        background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: 22, cursor: 'pointer',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit' }}>+</button>
                    <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)' }}>max {PRODUCT.maxPerOrder}</span>
                  </div>
                </div>
              </div>

              <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)',
                borderRadius: 14, padding: '16px 18px', marginBottom: 24 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>{PRODUCT.name} x {form.qty}</span>
                  <span style={{ fontSize: 14, color: '#f5f5f7' }}>${kitTotal}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)' }}>Priority Shipping</span>
                  <span style={{ fontSize: 14, color: '#f5f5f7' }}>${PRODUCT.shipping}</span>
                </div>
                <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 10,
                  display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ fontSize: 15, fontWeight: 600, color: '#f5f5f7' }}>Total</span>
                  <span style={{ fontSize: 15, fontWeight: 700, color: '#fff' }}>${grandTotal}</span>
                </div>
              </div>

              <button className="btn-primary" disabled={!form.name || !form.email || !form.phone || !form.address}
                onClick={() => { const n = 2; setStep(n); save(n, form, chosenMethod); }}
                style={{ width: '100%', padding: '16px', fontSize: 17 }}>
                Continue to Payment
              </button>
            </div>
          )}

          {step === 2 && (
            <div className="fade-up">
              <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.02em', marginBottom: 6 }}>Payment method</h2>
              <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginBottom: 24 }}>
                Ref: <code style={{ fontFamily: 'monospace', color: '#2997ff' }}>{orderRef}</code>
                <span style={{ marginLeft: 10, color: 'rgba(255,255,255,0.4)' }}>Total: ${grandTotal}</span>
              </p>
              <MethodSelector methods={GB_METHODS} chosen={chosenMethod} onChange={setChosenMethod} />
              <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
                <button className="btn-ghost" onClick={() => { setStep(1); save(1, form, chosenMethod); }}>Back</button>
                <button className="btn-primary" disabled={!chosenMethod}
                  onClick={() => { const n = 3; setStep(n); save(n, form, chosenMethod); }}
                  style={{ flex: 1, padding: '15px', fontSize: 16 }}>Continue</button>
              </div>
            </div>
          )}

          {step === 3 && (
            <div className="fade-up">
              <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.02em', marginBottom: 16 }}>Send payment</h2>

              <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start',
                background: 'rgba(255,69,58,0.10)', border: '1px solid rgba(255,69,58,0.45)',
                borderRadius: 12, padding: '14px 16px', marginBottom: 20 }}>
                <span style={{ fontSize: 18, flexShrink: 0 }}>!</span>
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, color: '#ff6961', marginBottom: 4 }}>Payment note - read carefully</p>
                  <p style={{ fontSize: 13.5, color: 'rgba(255,255,255,0.75)', lineHeight: 1.5 }}>
                    Put <strong style={{ color: '#fff' }}>absolutely nothing in the notes</strong> other than your order number
                    (<code style={{ fontFamily: 'monospace', color: '#2997ff' }}>{orderRef}</code>).
                    No product names, no descriptions - just the order number.
                  </p>
                </div>
              </div>

              <PaymentInstructions
                amountDue={grandTotal}
                reference={orderRef}
                methods={GB_METHODS}
                chosenId={chosenMethod}
                reported={reported}
                onReported={handleReported}
                businessName="PeakForm Bio"
              />
              {!reported && (
                <button className="btn-ghost" onClick={() => { setStep(2); save(2, form, chosenMethod); }}
                  style={{ marginTop: 14, width: '100%' }}>Back to payment method</button>
              )}
            </div>
          )}
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: '60px 24px 100px' }}>
          <p style={{ fontSize: 16, color: 'rgba(255,255,255,0.4)' }}>
            {isClosed
              ? 'This group buy has closed. Check back for the next cycle.'
              : 'This group buy opens ' + fmtDate(settings.openDate) + '.'}
          </p>
        </div>
      )}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('pfb_gb_auth') === '1');
  if (!authed) return React.createElement(PasswordGate, { onAuth: () => setAuthed(true) });
  return React.createElement(GroupBuyPage, null);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
