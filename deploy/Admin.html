<div id="root"></div>
<script type="text/babel">

const sb = window.createApiClient();
window.supabaseClient = sb; // expose so inventory-helper.js can use it

const ADMIN_EMAIL = 'bryanplett@gmail.com';

const STATUS_COLORS = {
  pending: { bg: 'rgba(255,159,10,0.14)', fg: '#ff9f0a' },
  invoiced: { bg: 'rgba(41,151,255,0.14)', fg: '#2997ff' },
  paid: { bg: 'rgba(52,199,89,0.14)', fg: '#34c759' },
  reported: { bg: 'rgba(41,151,255,0.14)', fg: '#2997ff' },
  shipped: { bg: 'rgba(191,90,242,0.14)', fg: '#bf5af2' },
  delivered: { bg: 'rgba(255,255,255,0.10)', fg: 'rgba(255,255,255,0.7)' },
  completed: { bg: 'rgba(52,199,89,0.14)', fg: '#34c759' },
  cancelled: { bg: 'rgba(255,69,58,0.14)', fg: '#ff453a' },
  unpaid:    { bg: 'rgba(255,159,10,0.14)', fg: '#ff9f0a' },
};

// Legacy combined list (kept for the status-filter chips on All Orders, which
// search both fulfillment and payment values).
const STATUS_OPTIONS = ['pending', 'invoiced', 'paid', 'shipped', 'delivered', 'completed', 'cancelled'];

// Split status: one dropdown for fulfillment, one for payment.
// Migration 2026_payment_status.sql moved 'invoiced'/'paid' off of `status`
// onto its own `payment_status` column.
const FULFILLMENT_OPTIONS = ['pending', 'shipped', 'Packed SJ', 'Packed MH', 'completed', 'cancelled'];
const PAYMENT_OPTIONS     = ['unpaid', 'reported', 'invoiced', 'paid'];

// Read effective fulfillment + payment from an order row, transparently
// handling legacy rows (where 'invoiced'/'paid' was stored in `status`
// because the migration hadn't run yet).
function readStatuses(o) {
  const rawStatus = o.status || 'pending';
  const isLegacyPayment = rawStatus === 'paid' || rawStatus === 'invoiced';
  const fulfillment = isLegacyPayment ? 'pending' : rawStatus;
  // payment_status (new column) wins; otherwise infer from legacy status.
  let payment = o.payment_status || (isLegacyPayment ? rawStatus : null);
  return { fulfillment, payment: payment || 'unpaid' };
}

// ─── Pricing helpers ─────────────────────────────────────────────────────────
// Product labels look like "Retatrutide — 10mg — $160". Extract the price.
function priceFromLabel(label) {
  const m = (label || '').match(/\$([\d,.]+)/);
  return m ? parseFloat(m[1].replace(/,/g, '')) || 0 : 0;
}

function couponMatchesLabel(coupon, label) {
  if (!coupon) return false;
  if (coupon.scope === 'all') return true;
  if (coupon.scope === 'retatrutide') return /\bretatrutide\b/i.test(label || '');
  return false;
}

// Compute pricing for a single order *group* (one checkout, possibly N lines).
// shipping/coupon/payment fields are duplicated on every line by the portal,
// so we read them off the first line.
function computeGroupTotals(groupOrders, couponsByCode) {
  const first = groupOrders[0] || {};
  const coupon = first.coupon_code
    ? (couponsByCode[String(first.coupon_code).toLowerCase()] || null)
    : null;
  let original = 0;
  let afterPctDiscount = 0;
  for (const o of groupOrders) {
    const label = o.product || o.item || '';
    const qty = parseInt(o.quantity ?? o.qty ?? 1, 10) || 1;
    const price = priceFromLabel(label);
    original += price * qty;
    if (coupon && coupon.kind === 'percent' && couponMatchesLabel(coupon, label)) {
      const pct = parseFloat(coupon.amount) || 0;
      afterPctDiscount += Math.max(0, price * (1 - pct / 100)) * qty;
    } else {
      afterPctDiscount += price * qty;
    }
  }
  let fixedDiscount = 0;
  if (coupon && coupon.kind === 'fixed') {
    const matchingSubtotal = groupOrders.reduce((s, o) => {
      const label = o.product || o.item || '';
      const qty = parseInt(o.quantity ?? o.qty ?? 1, 10) || 1;
      return couponMatchesLabel(coupon, label) ? s + priceFromLabel(label) * qty : s;
    }, 0);
    fixedDiscount = Math.min(matchingSubtotal, parseFloat(coupon.amount) || 0);
  }
  const subtotal = Math.max(0, afterPctDiscount - fixedDiscount);
  const discount = Math.max(0, original - subtotal);
  const shipping = Number(first.shipping_cost || 0) || 0;
  const total = subtotal + shipping;
  return { coupon, original, subtotal, discount, shipping, total };
}

// Group consecutive orders from the same checkout. The client portal inserts
// one `orders` row per cart line; they share (client_id, payment_method,
// shipping_method, coupon_code) and have `created_at` within seconds of each
// other. We collapse them into one visual order.
//   `sorted` is expected to be newest-first.
function groupOrders(sorted) {
  const groups = [];
  for (const o of sorted) {
    const t = new Date(o.created_at || o.ordered_at || 0).getTime();
    const key = [
      o.client_id || '',
      o.payment_method || '',
      o.shipping_method || '',
      o.coupon_code || '',
      o.shipping_address || '',
    ].join('|');
    const last = groups[groups.length - 1];
    // Same checkout if same key AND within 5 minutes of the group's most
    // recent line (orders flow in desc, so we extend backwards in time).
    if (last && last.key === key && Math.abs(t - last.minT) <= 5 * 60 * 1000) {
      last.orders.push(o);
      last.minT = Math.min(last.minT, t);
      last.maxT = Math.max(last.maxT, t);
    } else {
      groups.push({ key, orders: [o], minT: t, maxT: t });
    }
  }
  return groups;
}

// ─── Inventory helper ────────────────────────────────────────────────────────────────
// Cart labels look like "Retatrutide — 10mg — $160". The inventory table is
// keyed by the canonical product name without the trailing " — $price" suffix.
function canonicalProductName(label) {
  if (!label) return '';
  return String(label).replace(/\s+—\s+\$[\d,.]+\s*$/, '').trim();
}

// Decrement stock for an order that just moved to "completed". Guarded by
// `orders.inventory_applied` so flipping status back and forth doesn't
// double-count. Returns { ok, error } so callers can surface failures.
async function decrementInventoryForOrder(order) {
  try {
    // Re-fetch to read the current `inventory_applied` flag and avoid races.
    const { data: fresh, error: fetchErr } = await sb.from('orders')
      .select('id, product, item, quantity, qty, inventory_applied')
      .eq('id', order.id).single();
    if (fetchErr) return { ok: false, error: fetchErr.message };
    if (fresh.inventory_applied) return { ok: true, alreadyApplied: true };

    const productLabel = fresh.product || fresh.item || order.product || order.item || '';
    const qty = parseInt(fresh.quantity ?? fresh.qty ?? order.quantity ?? order.qty ?? 1, 10) || 1;
    const name = canonicalProductName(productLabel);
    if (!name) return { ok: false, error: 'No product name on order.' };

    // Read current stock (may not exist yet)
    const { data: inv } = await sb.from('inventory').select('stock').eq('product_name', name).maybeSingle();
    const current = inv?.stock ?? 0;
    const next = current - qty;

    const { error: upErr } = await sb.from('inventory').upsert(
      { product_name: name, stock: next, updated_at: new Date().toISOString() },
      { onConflict: 'product_name' }
    );
    if (upErr) return { ok: false, error: upErr.message };

    // Mark applied. If the column doesn't exist yet (migration not run),
    // swallow that specific error so the UI still works — admin will run the
    // migration and idempotency will start working then.
    const { error: flagErr } = await sb.from('orders')
      .update({ inventory_applied: true }).eq('id', order.id);
    if (flagErr && !/column .* does not exist/i.test(flagErr.message)) {
      return { ok: false, error: flagErr.message };
    }
    return { ok: true, name, qty, newStock: next };
  } catch (err) {
    return { ok: false, error: err.message || String(err) };
  }
}

// ─── Shared Orders Table ─────────────────────────────────────────────────────
// Renders a list of order rows as a flat table, with the portal's per-line
// inserts visually grouped back into single checkouts. Used by both the
// ClientDetail "orders" tab (showClient=false) and the global AllOrders view.
const OrdersTable = ({
  orders, couponsByCode, showClient, client, clientById,
  onOpenClient, onSetGroupStatus, onSetGroupPaymentStatus,
}) => {
  const groups = React.useMemo(() => groupOrders(orders || []), [orders]);

  if (!orders || orders.length === 0) {
    return (
      <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ padding: 24, color: 'rgba(255,255,255,0.4)' }}>No orders.</div>
      </div>
    );
  }

  const headers = showClient
    ? ['Date', 'Client', 'Items', 'Payment', 'Shipping', 'Total', 'Notes', 'Fulfillment', 'Payment', '']
    : ['Date', 'Items', 'Payment', 'Shipping', 'Total', 'Notes', 'Fulfillment', 'Payment', ''];

  // Column widths — explicit, so the action column (right) doesn't get
  // squeezed off-screen when the page is narrower than the table.
  const colWidths = showClient
    ? ['96px',  '180px', '300px', '120px', '220px', '140px', '160px', '110px', '110px', '180px']
    : ['96px',           '300px', '120px', '220px', '140px', '160px', '110px', '110px', '180px'];

  return (
    <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
      <div className="table-wrap">
        <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: showClient ? 1400 : 1240 }}>
          <colgroup>
            {colWidths.map((w, i) => <col key={i} style={{ width: w }} />)}
          </colgroup>
          <thead>
            <tr style={{ background: 'rgba(255,255,255,0.03)' }}>
              {headers.map((h, i) => (
                <th key={i} style={{
                  textAlign: 'left', padding: '12px 18px',
                  fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.6)',
                  textTransform: 'uppercase', letterSpacing: 0.5,
                  whiteSpace: 'nowrap',
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {groups.map(g => {
              const first = g.orders[0];
              const c = showClient ? (clientById && clientById[first.client_id]) : client;
              const totals = computeGroupTotals(g.orders, couponsByCode);
              const { fulfillment, payment } = readStatuses(first);
              const sc  = STATUS_COLORS[fulfillment] || STATUS_COLORS.pending;
              const pc  = STATUS_COLORS[payment]     || STATUS_COLORS.unpaid;
              const couponLabel = totals.coupon
                ? `${totals.coupon.kind === 'percent'
                      ? totals.coupon.amount + '%'
                      : '$' + totals.coupon.amount} off${totals.coupon.scope === 'retatrutide' ? ' Retatrutide' : ''}`
                : '';
              return (
                <tr key={first.id} style={{ borderTop: '1px solid rgba(255,255,255,0.05)', verticalAlign: 'top' }}>
                  <td style={{ padding: '14px 18px', color: 'rgba(255,255,255,0.6)', fontSize: 13, whiteSpace: 'nowrap' }}>
                    {new Date(first.created_at || first.ordered_at).toLocaleDateString()}
                  </td>
                  {showClient && (
                    <td style={{ padding: '14px 18px', fontSize: 14 }}>
                      {c ? (
                        <button onClick={() => onOpenClient && onOpenClient(c)}
                          style={{ background: 'transparent', border: 'none', color: '#2997ff', cursor: 'pointer', padding: 0, fontSize: 14, fontFamily: 'inherit', textAlign: 'left' }}>
                          {c.name || c.email}
                        </button>
                      ) : (
                        <span style={{ color: 'rgba(255,255,255,0.4)' }}>Unknown</span>
                      )}
                      {c?.email && <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.email}</div>}
                      {(first.phone_at_order || c?.phone) && (
                        <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', marginTop: 2 }}>{first.phone_at_order || c.phone}</div>
                      )}
                    </td>
                  )}
                  <td style={{ padding: '14px 18px', fontSize: 14 }}>
                    {g.orders.length > 1 && (
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6, fontWeight: 600 }}>
                        {g.orders.length} items
                      </div>
                    )}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      {g.orders.map(o => {
                        const label = o.product || o.item || '—';
                        const qty = parseInt(o.quantity ?? o.qty ?? 1, 10) || 1;
                        const price = priceFromLabel(label);
                        const matches = totals.coupon && totals.coupon.kind === 'percent' && couponMatchesLabel(totals.coupon, label);
                        const effPrice = matches
                          ? Math.max(0, price * (1 - (parseFloat(totals.coupon.amount) || 0) / 100))
                          : price;
                        return (
                          <div key={o.id} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, fontSize: 13, lineHeight: 1.4 }}>
                            <span style={{ color: 'rgba(255,255,255,0.85)' }}>
                              {qty > 1 && <span style={{ color: 'rgba(255,255,255,0.45)', marginRight: 6 }}>{qty}×</span>}
                              {label}
                            </span>
                            <span style={{ whiteSpace: 'nowrap', color: 'rgba(255,255,255,0.7)', fontVariantNumeric: 'tabular-nums' }}>
                              {matches ? (
                                <>
                                  <span style={{ color: 'rgba(255,255,255,0.4)', textDecoration: 'line-through', marginRight: 6 }}>${(price * qty).toFixed(2)}</span>
                                  <span style={{ color: '#7be39a' }}>${(effPrice * qty).toFixed(2)}</span>
                                </>
                              ) : (
                                <span>${(price * qty).toFixed(2)}</span>
                              )}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </td>
                  <td style={{ padding: '14px 18px', fontSize: 13 }}>
                    {first.payment_method
                      ? <span className="tag" style={{ background: 'rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.85)' }}>{first.payment_method}</span>
                      : <span style={{ color: 'rgba(255,255,255,0.3)' }}>—</span>}
                    {first.coupon_code && (
                      <div style={{ fontSize: 11, color: '#7be39a', marginTop: 6 }}>
                        coupon: {first.coupon_code}
                        {couponLabel && (
                          <div style={{ color: 'rgba(123,227,154,0.7)', marginTop: 2 }}>({couponLabel})</div>
                        )}
                      </div>
                    )}
                  </td>
                  <td style={{ padding: '14px 18px', fontSize: 13, color: 'rgba(255,255,255,0.7)' }}>
                    {first.shipping_method && (
                      <div style={{ fontWeight: 500, color: 'rgba(255,255,255,0.85)' }}>
                        {first.shipping_method}
                        {first.shipping_cost != null && Number(first.shipping_cost) > 0 && (
                          <span style={{ color: 'rgba(255,255,255,0.5)', marginLeft: 6 }}>+${Number(first.shipping_cost).toFixed(2)}</span>
                        )}
                      </div>
                    )}
                    {first.shipping_address && (
                      <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.55)', marginTop: 4, whiteSpace: 'pre-wrap' }}>{first.shipping_address}</div>
                    )}
                    {!showClient && (first.phone_at_order && first.phone_at_order !== (client?.phone)) && (
                      <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginTop: 4 }}>☎ {first.phone_at_order}</div>
                    )}
                    {!first.shipping_method && !first.shipping_address && (
                      <span style={{ color: 'rgba(255,255,255,0.3)' }}>—</span>
                    )}
                  </td>
                  <td style={{ padding: '14px 18px', fontSize: 13, fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>
                    {totals.discount > 0 && (
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', textDecoration: 'line-through', marginBottom: 2 }}>
                        ${totals.original.toFixed(2)}
                      </div>
                    )}
                    <div style={{ fontSize: 15, fontWeight: 600, color: '#fff' }}>
                      ${totals.total.toFixed(2)}
                    </div>
                    {totals.discount > 0 && (
                      <div style={{ fontSize: 11, color: '#7be39a', marginTop: 2 }}>
                        −${totals.discount.toFixed(2)} off
                      </div>
                    )}
                    {totals.shipping > 0 && (
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', marginTop: 2 }}>
                        incl. ${totals.shipping.toFixed(2)} ship
                      </div>
                    )}
                  </td>
                  <td style={{ padding: '14px 18px', fontSize: 13, color: 'rgba(255,255,255,0.55)' }}>
                    {first.notes || '—'}
                  </td>
                  <td style={{ padding: '14px 18px' }}>
                    <span className="tag" style={{ background: sc.bg, color: sc.fg }}>{fulfillment}</span>
                  </td>
                  <td style={{ padding: '14px 18px' }}>
                    <span className="tag" style={{ background: pc.bg, color: pc.fg }}>{payment}</span>
                  </td>

// ─── Client email export ───────────────────────────────────────────────────────
// Builds a Google Contacts / Gmail–ready CSV of every client that has a valid
// email and triggers a download. Pure client-side — uses the clients already
// loaded into the admin, so no backend call or migration is needed.
//
// To use the file: Google Contacts → Import → select this CSV. The contacts can
// then be added to a label/group and dropped into Bcc when composing in Gmail.
function exportClientsCsv(clients) {
  // Keep only rows with a plausible email, de-duped by lowercased address.
  const seen = new Set();
  const rows = (clients || []).filter(c => {
    const e = (c.email || '').trim().toLowerCase();
    if (!e || !e.includes('@') || seen.has(e)) return false;
    seen.add(e);
    return true;
  });

  // CSV field escaping per RFC 4180 — wrap in quotes if it contains a comma,
  // quote, or newline, and double any embedded quotes.
  const esc = (v) => {
    const s = String(v == null ? '' : v);
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };

  // Google Contacts recognizes these exact column headers.
  const header = ['Name', 'E-mail 1 - Value', 'Phone 1 - Value'];
  const lines = [header.join(',')];
  for (const c of rows) {
    lines.push([esc(c.name || c.email), esc(c.email), esc(c.phone || '')].join(','));
  }
  // \r\n line endings + a UTF-8 BOM so Excel/Sheets read it cleanly too.
  const csv = '\uFEFF' + lines.join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'peakform-clients-' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return rows.length;
}

// ─── Client Detail ────────────────────────────────────────────────────────────
const ClientDetail = ({ client, onBack, onEdit, onMealPlan }) => {
  const [tab, setTab] = React.useState('profile');
  const [orders, setOrders] = React.useState([]);
  const [coupons, setCoupons] = React.useState([]);
  const [nutrition, setNutrition] = React.useState('');
  const [workout, setWorkout] = React.useState('');
  const [bloodwork, setBloodwork] = React.useState([]);
  const [saveMsg, setSaveMsg] = React.useState('');

  // Coupons keyed by lowercased code, for fast lookup when computing discounted
  // order totals on the invoicing view.
  const couponsByCode = React.useMemo(() => {
    const m = {};
    (coupons || []).forEach(c => { if (c.code) m[String(c.code).toLowerCase()] = c; });
    return m;
  }, [coupons]);

  React.useEffect(() => {
    (async () => {
      // The orders table has lived under two schemas (item/qty vs product/quantity,
      // created_at vs ordered_at). Pull * and let render-side normalize, and sort in JS
      // so a missing timestamp column doesn't fail the query.
      const { data: ords } = await sb.from('orders').select('*').eq('client_id', client.id);
      const sorted = (ords || []).slice().sort((a, b) => {
        const ta = new Date(a.created_at || a.ordered_at || 0).getTime();
        const tb = new Date(b.created_at || b.ordered_at || 0).getTime();
        return tb - ta;
      });
      setOrders(sorted);
      const { data: np } = await sb.from('nutrition_plans').select('*').eq('client_id', client.id).maybeSingle();
      setNutrition(np?.content || '');
      const { data: wp } = await sb.from('workout_plans').select('*').eq('client_id', client.id).maybeSingle();
      setWorkout(wp?.content || '');
      const { data: bw } = await sb.from('bloodwork_files').select('*').eq('client_id', client.id).order('uploaded_at', { ascending: false });
      setBloodwork(bw || []);
      // Coupons drive the discounted-price column. Inactive ones still get
      // pulled in because historical orders may reference codes that have
      // since been disabled.
      const { data: cps } = await sb.from('coupons').select('*');
      setCoupons(cps || []);
    })();
  }, [client.id]);

  // ─── Status updates ────────────────────────────────────────────────────
  // We split the single legacy `status` field into two independent dropdowns:
  // one for fulfillment (status), one for payment (payment_status, added by
  // migration 2026_payment_status.sql). When a group of orders share a
  // checkout, both updates fan out to every row in the group so they stay
  // in lock-step.
  const setOrderStatus = async (id, status) => {
    await sb.from('orders').update({ status }).eq('id', id);
    setOrders(o => o.map(x => x.id === id ? {...x, status} : x));
    if (status === 'completed') {
      const target = orders.find(x => x.id === id);
      if (target) {
        const res = await decrementInventoryForOrder(target);
        if (!res.ok) console.warn('Inventory decrement failed:', res.error);
      }
    }
    if (status === 'cancelled' && typeof window.restockInventoryForOrder === 'function') {
      const target = orders.find(x => x.id === id);
      if (target) {
        const res = await window.restockInventoryForOrder(target);
        if (!res.ok) console.warn('Inventory restock failed:', res.error);
      }
    }
  };
  const setOrderPaymentStatus = async (id, payment_status) => {
    // Empty string in the <select> maps to 'unpaid' = null in the DB.
    const val = payment_status && payment_status !== 'unpaid' ? payment_status : null;
    const { error } = await sb.from('orders').update({ payment_status: val }).eq('id', id);
    if (error && /column .* does not exist/i.test(error.message || '')) {
      // Migration not yet applied — fall back to legacy behavior so the UI
      // doesn't break. Stuff 'paid'/'invoiced' back into `status`.
      if (val) await sb.from('orders').update({ status: val }).eq('id', id);
    }
    setOrders(o => o.map(x => x.id === id ? { ...x, payment_status: val } : x));
  };
  const setGroupStatus = async (groupOrdersList, status) => {
    await Promise.all(groupOrdersList.map(o => setOrderStatus(o.id, status)));
  };
  const setGroupPaymentStatus = async (groupOrdersList, payment_status) => {
    await Promise.all(groupOrdersList.map(o => setOrderPaymentStatus(o.id, payment_status)));
  };

  const savePlan = async (kind) => {
    const table = kind === 'nutrition' ? 'nutrition_plans' : 'workout_plans';
    const content = kind === 'nutrition' ? nutrition : workout;
    const { error } = await sb.from(table).upsert({ client_id: client.id, content, updated_at: new Date().toISOString() }, { onConflict: 'client_id' });
    if (error) { setSaveMsg('Error: ' + error.message); return; }
    setSaveMsg('Saved.');
    setTimeout(() => setSaveMsg(''), 2000);
  };

  const deleteClient = async () => {
    const ok = window.confirm(
      `Delete ${client.name || client.email}?\n\n` +
      `This removes the client record and all of their plans, orders, weigh-ins, and bloodwork.\n\n` +
      `Note: their auth login (if any) lives in Supabase Auth and must be removed there separately.`
    );
    if (!ok) return;
    const { error } = await sb.from('clients').delete().eq('id', client.id);
    if (error) { window.alert('Delete failed: ' + error.message); return; }
    onBack();
  };

  return (
    <div className="fade-in">
      <button className="btn-ghost" onClick={onBack} style={{ marginBottom: 20 }}>← All clients</button>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:12, marginBottom: 4 }}>
        <div>
          <h2 style={{ fontSize: 28, fontWeight: 600, letterSpacing: '-0.025em' }}>{client.name}</h2>
          <p style={{ color: 'rgba(255,255,255,0.5)', marginTop: 4, fontSize: 14 }}>{client.email} · {client.phone || 'no phone'}</p>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <button className="btn-ghost" onClick={()=>onEdit && onEdit(client,'workout')}>Edit Workout</button>
          <button className="btn-ghost" onClick={()=>onEdit && onEdit(client,'nutrition')}>Edit Nutrition</button>
          <button className="btn-ghost" onClick={()=>onMealPlan && onMealPlan(client)}>Edit Meal Plan</button>
          <button className="btn-ghost" onClick={deleteClient}
            style={{ color: '#ff453a', borderColor: 'rgba(255,69,58,0.3)' }}>Delete client</button>
        </div>
      </div>
      <div style={{ marginBottom: 24 }} />

      <div style={{ display: 'flex', gap: 4, marginBottom: 20, borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
        {['profile','orders','nutrition','workout','weigh-in','bloodwork'].map(t => (
          <button key={t} onClick={() => setTab(t)}
            style={{ background: 'transparent', border: 'none', color: tab === t ? '#fff' : 'rgba(255,255,255,0.5)',
              padding: '10px 16px', fontSize: 14, fontWeight: tab === t ? 600 : 400, cursor: 'pointer',
              borderBottom: tab === t ? '2px solid #2997ff' : '2px solid transparent',
              textTransform: 'capitalize' }}>{t}</button>
        ))}
      </div>

      {tab === 'profile' && window.ProfileEditor && (
        <window.ProfileEditor sb={sb} client={client}
          onSaved={(updated) => { Object.assign(client, updated); }} />
      )}

      {tab === 'orders' && (
        <OrdersTable
          orders={(orders || []).filter(o => readStatuses(o).fulfillment !== 'cancelled')}
          couponsByCode={couponsByCode}
          showClient={false}
          client={client}
          onSetGroupStatus={setGroupStatus}
          onSetGroupPaymentStatus={setGroupPaymentStatus} />
      )}

      {(tab === 'nutrition' || tab === 'workout') && (
        <div className="card">
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', marginBottom: 12 }}>
            Edit the {tab} plan below. The client sees this in their portal immediately after saving.
          </p>
          <textarea className="field-input"
            placeholder={tab === 'nutrition' ? 'Daily targets, meal structure, supplements...' : 'Weekly schedule, exercises, sets/reps...'}
            value={tab === 'nutrition' ? nutrition : workout}
            onChange={e => tab === 'nutrition' ? setNutrition(e.target.value) : setWorkout(e.target.value)}
            style={{ minHeight: 320 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 16 }}>
            <button className="btn-blue" onClick={() => savePlan(tab)}>Save Plan</button>
            {saveMsg && <span style={{ fontSize: 13, color: saveMsg.startsWith('Error') ? '#ff453a' : '#34c759' }}>{saveMsg}</span>}
          </div>
        </div>
      )}

      {tab === 'weigh-in' && (
        <WeighIn sb={sb} userId={client.id} readOnly={true} clientName={client.name} />
      )}

      {tab === 'bloodwork' && (
        <div className="card">
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>
            Files the client has uploaded. ({bloodwork.length})
          </p>
          {bloodwork.length === 0 && <p style={{ color: 'rgba(255,255,255,0.4)' }}>No bloodwork files yet.</p>}
          {bloodwork.map(f => (
            <div key={f.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid rgba(255,255,255,0.05)', fontSize: 14 }}>
              <span>{f.file_name}</span>
              <span style={{ color: 'rgba(255,255,255,0.5)', fontSize: 13 }}>{new Date(f.uploaded_at).toLocaleDateString()}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

  const [statusFilter, setStatusFilter] = React.useState('all');

  const clientById = React.useMemo(() => {
    const m = {};
    (clients || []).forEach(c => { m[c.id] = c; });
    return m;
  }, [clients]);

  const couponsByCode = React.useMemo(() => {
    const m = {};
    (coupons || []).forEach(c => { if (c.code) m[String(c.code).toLowerCase()] = c; });
    return m;
  }, [coupons]);

  const load = React.useCallback(async () => {
    setOrders(null);
    const { data, error } = await sb.from('orders').select('*');
    if (error) {
      console.error('Failed to load orders:', error);
      setOrders([]);
      return;
    }
    const sorted = (data || []).slice().sort((a, b) => {
      const ta = new Date(a.created_at || a.ordered_at || 0).getTime();
      const tb = new Date(b.created_at || b.ordered_at || 0).getTime();
      return tb - ta;
    });
    setOrders(sorted);
    // Coupons (active + historic) for discount lookup.
    const { data: cps } = await sb.from('coupons').select('*');
    setCoupons(cps || []);
  }, []);

  React.useEffect(() => { load(); }, [load]);

  // Update fulfillment status on a single order.
  const setOrderStatus = async (id, status) => {
    await sb.from('orders').update({ status }).eq('id', id);
    setOrders(o => (o || []).map(x => x.id === id ? { ...x, status } : x));
    if (status === 'completed') {
      const target = (orders || []).find(x => x.id === id);
      if (target) {
        const res = await decrementInventoryForOrder(target);
        if (!res.ok) console.warn('Inventory decrement failed:', res.error);
      }
    }
    if (status === 'cancelled' && typeof window.restockInventoryForOrder === 'function') {
      const target = (orders || []).find(x => x.id === id);
      if (target) {
        const res = await window.restockInventoryForOrder(target);
        if (!res.ok) console.warn('Inventory restock failed:', res.error);
      }
    }
  };
  // Update payment status on a single order. Falls back to legacy `status`
  // column if the 2026_payment_status migration hasn't been applied yet.
  const setOrderPaymentStatus = async (id, payment_status) => {
    const val = payment_status && payment_status !== 'unpaid' ? payment_status : null;
    const { error } = await sb.from('orders').update({ payment_status: val }).eq('id', id);
    if (error && /column .* does not exist/i.test(error.message || '')) {
      if (val) await sb.from('orders').update({ status: val }).eq('id', id);
    }
    setOrders(o => (o || []).map(x => x.id === id ? { ...x, payment_status: val } : x));
  };
  const setGroupStatus = async (groupOrdersList, status) => {
    await Promise.all(groupOrdersList.map(o => setOrderStatus(o.id, status)));
  };
  const setGroupPaymentStatus = async (groupOrdersList, payment_status) => {
    await Promise.all(groupOrdersList.map(o => setOrderPaymentStatus(o.id, payment_status)));
  };

  // Filter chips understand both fulfillment values AND payment values
  // (invoiced/paid). For payment ones, we match against the derived payment
  // status (handles legacy rows where 'paid' was stored in `status`).
  const filtered = React.useMemo(() => {
    if (!orders) return [];
    const q = query.trim().toLowerCase();
    return orders.filter(o => {
      const { fulfillment, payment } = readStatuses(o);
      // Hide cancelled by default. They only appear when the user explicitly
      // clicks the "cancelled" filter chip.
      if (statusFilter !== 'cancelled' && fulfillment === 'cancelled') return false;
      if (statusFilter !== 'all') {
        if (statusFilter === 'invoiced' || statusFilter === 'paid') {
          if (payment !== statusFilter) return false;
        } else {
          if (fulfillment !== statusFilter) return false;
        }
      }
      if (!q) return true;
      const c = clientById[o.client_id];
      const blob = [
        o.item, o.product, o.notes, o.coupon_code,
        c?.name, c?.email, c?.phone,
      ].filter(Boolean).join(' ').toLowerCase();
      return blob.includes(q);
    });
  }, [orders, statusFilter, query, clientById]);

  const counts = React.useMemo(() => {
    const c = { all: 0 };
    STATUS_OPTIONS.forEach(s => { c[s] = 0; });
    (orders || []).forEach(o => {
      c.all += 1;
      const { fulfillment, payment } = readStatuses(o);
      if (c[fulfillment] !== undefined) c[fulfillment] += 1;
      if (payment !== 'unpaid' && c[payment] !== undefined) c[payment] += 1;
    });
    return c;
  }, [orders]);

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12, marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 28, fontWeight: 600, letterSpacing: '-0.025em' }}>All Orders</h2>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginTop: 4 }}>
            Every order across all clients, newest first.
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-ghost" onClick={load}>Refresh</button>
          <button className="btn-ghost" onClick={onBack}>← Clients</button>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', marginBottom: 20 }}>
        <input
          className="field-input"
          placeholder="Search by client, product, notes…"
          value={query}
          onChange={e => setQuery(e.target.value)}
          style={{ flex: '1 1 280px', maxWidth: 420 }} />
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {['all', ...STATUS_OPTIONS].map(s => {
            const active = statusFilter === s;
            return (
              <button key={s} onClick={() => setStatusFilter(s)}
                style={{
                  background: active ? 'rgba(41,151,255,0.18)' : 'rgba(255,255,255,0.04)',
                  color: active ? '#2997ff' : 'rgba(255,255,255,0.7)',
                  border: '1px solid ' + (active ? 'rgba(41,151,255,0.45)' : 'rgba(255,255,255,0.08)'),
                  borderRadius: 980, padding: '7px 14px', fontSize: 13, cursor: 'pointer',
                  textTransform: 'capitalize', fontWeight: active ? 600 : 400,
                }}>
                {s} <span style={{ color: 'rgba(255,255,255,0.4)', marginLeft: 4 }}>{counts[s] ?? 0}</span>
              </button>
            );
          })}
        </div>
      </div>

      {orders === null && (
        <div className="card" style={{ padding: 32, color: 'rgba(255,255,255,0.5)', textAlign: 'center' }}>Loading…</div>
      )}
      {orders !== null && filtered.length === 0 && (
        <div className="card" style={{ padding: 32, color: 'rgba(255,255,255,0.4)', textAlign: 'center' }}>
          {orders.length === 0
            ? 'No orders yet. When clients check out, orders will appear here.'
            : 'No orders match this filter.'}
        </div>
      )}
      {filtered.length > 0 && (
        <OrdersTable
          orders={filtered}
          couponsByCode={couponsByCode}
          showClient={true}
          clientById={clientById}
          onOpenClient={onOpenClient}
          onSetGroupStatus={setGroupStatus}
          onSetGroupPaymentStatus={setGroupPaymentStatus} />
      )}
    </div>
  );
};

// ─── Group Buy Settings ───────────────────────────────────────────────────────
const GroupBuySettings = ({ onBack }) => {
  const [cfg, setCfg] = React.useState({
    password:      'PFBVIP2026',
    testResultsIn: false,
    openDate:      '2026-07-01',
    closeDate:     '2026-07-10',
  });
  const [saved, setSaved] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState('');

  React.useEffect(() => {
    // Load current settings from backend
    const token = localStorage.getItem('_pfb_token');
      headers: { 'Authorization': 'Bearer ' + token }
    })
      .then(r => r.ok ? r.json() : null)
      .then(s => { if (s) setCfg(c => Object.assign({}, c, s)); })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  const save = async () => {
    setError('');
    const token = localStorage.getItem('_pfb_token');
    try {
      const r = await fetch('/api/admin/groupbuy-settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(cfg),
      });
      if (!r.ok) throw new Error('Save failed');
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch (e) {
      setError('Could not save. Try again.');
    }
  };

  const labelStyle = { fontSize: 13, fontWeight: 600, color: 'rgba(255,255,255,0.65)', display: 'block', marginBottom: 8 };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 28 }}>
        <button className="btn-ghost" onClick={onBack}>← Back</button>
        <h2 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.02em' }}>Group Buy Settings</h2>
      </div>

      {loading ? (
        <p style={{ color: 'rgba(255,255,255,0.45)', fontSize: 14 }}>Loading settings...</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>

          <div>
            <label style={labelStyle}>Access Code</label>
            <input className="field-input" type="text" value={cfg.password}
              onChange={e => setCfg(c => ({ ...c, password: e.target.value }))}
              placeholder="PFBVIP2026" />
            <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.35)', marginTop: 6 }}>
              Case-insensitive. Share only with vendors.
            </p>
          </div>

          <div style={{ display: 'flex', gap: 14 }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Open Date</label>
              <input className="field-input" type="date" value={cfg.openDate}
                onChange={e => setCfg(c => ({ ...c, openDate: e.target.value }))} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Close Date</label>
              <input className="field-input" type="date" value={cfg.closeDate}
                onChange={e => setCfg(c => ({ ...c, closeDate: e.target.value }))} />
            </div>
          </div>

          <div>
            <label style={labelStyle}>Test Results</label>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button type="button" onClick={() => setCfg(c => ({ ...c, testResultsIn: !c.testResultsIn }))}
                style={{ width: 46, height: 27, borderRadius: 14, border: 'none', cursor: 'pointer', flexShrink: 0,
                  background: cfg.testResultsIn ? '#34c759' : 'rgba(255,255,255,0.14)',
                  position: 'relative', transition: 'background 0.2s' }}>
                <div style={{ position: 'absolute', top: 3,
                  left: cfg.testResultsIn ? 22 : 3,
                  width: 21, height: 21, borderRadius: '50%', background: '#fff',
                  transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.3)' }} />
              </button>
              <span style={{ fontSize: 14, color: cfg.testResultsIn ? '#34c759' : 'rgba(255,255,255,0.5)', lineHeight: 1.4 }}>
                {cfg.testResultsIn
                  ? 'Results received — price is $90/kit'
                  : 'Awaiting results — price is $85/kit (early bird)'}
              </span>
            </div>
          </div>

          <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 20,
            display: 'flex', alignItems: 'center', gap: 14 }}>
            <button className="btn-blue" onClick={save} style={{ padding: '11px 28px' }}>
              {saved ? '✓ Saved' : 'Save Settings'}
            </button>
            {saved && <span style={{ fontSize: 13, color: '#34c759' }}>Settings saved — live on pfbgb.com.</span>}
            {error && <span style={{ fontSize: 13, color: '#ff453a' }}>{error}</span>}
          </div>
        </div>
      </div>
      )}
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [clients, setClients] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [editor, setEditor] = React.useState(null); // { client, kind: 'workout'|'nutrition' }
  const [showCalculator, setShowCalculator] = React.useState(false);
  const [showPlanner, setShowPlanner] = React.useState(false);
  const [showPayments, setShowPayments] = React.useState(false);
  const [showPricelist, setShowPricelist] = React.useState(false);
  const [plannerClientId, setPlannerClientId] = React.useState(null);
  const [showBuilder, setShowBuilder] = React.useState(false);
  const [showRecipes, setShowRecipes] = React.useState(false);
  const [showOrders, setShowOrders] = React.useState(false);
  const [showCoupons, setShowCoupons] = React.useState(false);
  const [showInventory, setShowInventory] = React.useState(false);
  const [showGroupBuy, setShowGroupBuy] = React.useState(false);

  const clearViews = () => {
    setShowBuilder(false);
    setShowCalculator(false);
    setShowPlanner(false);
    setPlannerClientId(null);
    setShowPayments(false);
    setShowPricelist(false);
    setShowRecipes(false);
    setShowOrders(false);
    setShowCoupons(false);
    setShowInventory(false);
    setShowGroupBuy(false);
    setSelected(null);
    setEditor(null);
  };

  const loadClients = async () => {
    const { data } = await sb.from('clients').select('*').order('created_at', { ascending: false });
    setClients(data || []);
  };

  React.useEffect(() => {
    (async () => {
      if (window.loadPricelists) { try { await window.loadPricelists(sb); } catch (e) {} }
      const { data: { session } } = await sb.auth.getSession();
      if (session && session.user && session.user.role === 'admin') {
        setUser(session.user);
        await loadClients();
      }
      setLoading(false);
    })();
  }, []);

  const onSignedIn = async (u) => {
    setUser(u);
    await loadClients();
  };

  const signOut = async () => {
    await sb.auth.signOut();
    setUser(null);
    setSelected(null);
  };

  if (loading) return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.5)' }}>Loading…</div>;
  if (!user) return <Login onSignedIn={onSignedIn} />;

  return (
    <div style={{ minHeight: '100vh' }}>
      <header className="admin-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <img src="1_5058098532557259934/PNG/VV/Asset 1@4x.png" alt="" style={{ height: 36, width: 'auto' }} />
          <span style={{ fontSize: 12, letterSpacing: 2, color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase' }}>Admin</span>
        </div>
        <div className="admin-header-actions" style={{ display: 'flex', alignItems: 'center' }}>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowOrders(true); }}>Orders</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowInventory(true); }}>Inventory</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowCoupons(true); }}>Coupons</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowBuilder(true); }}><span className="label-long">Workout </span>Builder</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowCalculator(true); }}><span className="label-long">Macros </span>Calculator</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowPlanner(true); }}><span className="label-long">Meal </span>Planner</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowRecipes(true); }}>Recipes</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowPricelist(true); }}>Pricelist</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowPayments(true); }}>Payments</button>
          <button className="btn-ghost" onClick={() => { clearViews(); setShowGroupBuy(true); }}>Group Buy</button>
          <span className="admin-email" style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>{user.email}</span>
          <button className="btn-ghost" onClick={signOut}>Sign Out</button>
        </div>
      </header>

      <main className={"admin-main" + ((showOrders || selected || editor) ? " is-wide" : "")}>
        {showBuilder
          ? <WorkoutBuilder sb={sb} clients={clients} onBack={() => setShowBuilder(false)} />
          : showPlanner && window.StandaloneMealPlanner
          ? <window.StandaloneMealPlanner sb={sb} clients={clients} initialClientId={plannerClientId} onBack={() => { setShowPlanner(false); setPlannerClientId(null); }} />
          : showCalculator
          ? <MacrosCalculator sb={sb} clients={clients} onBack={() => setShowCalculator(false)} />
          : showPayments && window.PaymentSettings
          ? <window.PaymentSettings sb={sb} onBack={() => setShowPayments(false)} />
          : showPricelist && window.PricelistManager
          ? <window.PricelistManager sb={sb} clients={clients} onBack={() => setShowPricelist(false)} />
          : showRecipes
          ? <window.RecipesDB sb={sb} onBack={() => setShowRecipes(false)} />
          : showOrders
          ? <AllOrders
              clients={clients}
              onBack={() => setShowOrders(false)}
              onOpenClient={(c) => { setShowOrders(false); setSelected(c); }} />
          : showCoupons && window.CouponsManager
          ? <window.CouponsManager sb={sb} onBack={() => setShowCoupons(false)} />
          : showInventory && window.InventoryManager
          ? <window.InventoryManager sb={sb} onBack={() => setShowInventory(false)} />
          : showGroupBuy
          ? <GroupBuySettings onBack={() => setShowGroupBuy(false)} />
          : editor
          ? (editor.kind === 'workout'
              ? <WorkoutEditor sb={sb} client={editor.client} onBack={() => setEditor(null)} />
              : <NutritionEditor sb={sb} client={editor.client} onBack={() => setEditor(null)} />)
          : selected
            ? <ClientDetail client={selected} onBack={() => { setSelected(null); loadClients(); }} onEdit={(c,kind)=>setEditor({client:c,kind})} onMealPlan={(c)=>{ clearViews(); setPlannerClientId(c.id); setShowPlanner(true); }} />
            : <ClientsList clients={clients} onSelect={setSelected} onEdit={(c,kind)=>setEditor({client:c,kind})} onRefresh={loadClients} />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
