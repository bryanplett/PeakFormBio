// ─── Login ────────────────────────────────────────────────────────────────────
const LoginScreen = ({ onLogin }) => {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const { data, error } = await sb.auth.signInWithPassword({ email: email.trim().toLowerCase(), password });
    setLoading(false);
    if (error) setError(error.message || 'Sign-in failed.');
    else if (data?.user) onLogin(data.user.id);
  };

  return (
    <div style={{
      minHeight: '100vh', background: '#000',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 24,
      backgroundImage: 'radial-gradient(ellipse at 50% 40%, rgba(0,102,204,0.18) 0%, transparent 65%)',
    }}>
      <div style={{ width: '100%', maxWidth: 420 }}>
        <div style={{ textAlign: 'center', marginBottom: 40, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <img src="1_5058098532557259934/PNG/VV/Asset 1@4x.png" alt="PeakForm Bio"
            style={{ height: 360, width: 'auto', marginBottom: 16 }} />
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>
            Client Portal
          </p>
        </div>

        <div className="card" style={{ borderRadius: 20, padding: 36 }}>
          <h2 style={{ fontSize: 24, fontWeight: 600, marginBottom: 6, letterSpacing: '-0.02em' }}>Sign in</h2>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.45)', marginBottom: 28 }}>
            Enter your email and password to access your portal.
          </p>
          <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 8 }}>Email</label>
              <input className="field-input" type="email" placeholder="you@email.com" required
                value={email} onChange={e => { setEmail(e.target.value); setError(''); }} />
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 8 }}>Password</label>
              <input className="field-input" type="password" placeholder="••••••••" required
                value={password} onChange={e => { setPassword(e.target.value); setError(''); }} />
            </div>
            {error && <p style={{ fontSize: 13, color: '#ff453a', letterSpacing: '-0.12px' }}>{error}</p>}
            <button type="submit" className="btn-blue" disabled={loading}
              style={{ marginTop: 4, padding: '13px', fontSize: 16, opacity: loading ? 0.6 : 1 }}>
              {loading ? 'Signing in…' : 'Sign In'}
            </button>
          </form>
          <p style={{ marginTop: 20, fontSize: 12, color: 'rgba(255,255,255,0.35)', textAlign: 'center', lineHeight: 1.5 }}>
            No account yet? Your coach will set up your access.
          </p>
        </div>
      </div>
    </div>
  );
};

// Resolve a product label to its explicit pricelist category title (Admin-set),
// e.g. "Ipamorelin — 10mg — $125" → "Growth Hormone / Recovery / Muscle".
const _labelToProductName = (label) =>
  String(label || '').replace(/\s*[—–]\s*\$[\d.,]+\s*$/, '').trim();
const lookupCategoryTitle = (label) => {
  const target = _labelToProductName(label);
  const PL = window.PRICELISTS || {};
  for (const k of Object.keys(PL)) {
    const prods = (PL[k] && PL[k].products) || [];
    const hit = prods.find(p => p && p.name === target);
    if (hit && hit.category) return hit.category;
  }
  return null;
};
const blurbForCategory = (lower, id) => {
  const cat = CATEGORY_MAP.find(c => c.id === id);
  if (!cat || !cat.blurbs) return '';
  let blurb = '';
  for (const key of Object.keys(cat.blurbs)) if (key && lower.includes(key)) blurb = cat.blurbs[key];
  return blurb;
};
const categorize = (label) => {
  const lower = label.toLowerCase();
  // 1) Prefer the explicit category set on the product in Admin → Pricelist.
  const title = lookupCategoryTitle(label);
  if (title) {
    const meta = window.getCategoryMeta && window.getCategoryMeta(title);
    if (meta) return { categoryId: meta.id, blurb: blurbForCategory(lower, meta.id) };
  }
  // 2) Fallback: legacy substring matching.
  for (const cat of CATEGORY_MAP) {
    for (const m of cat.matches) {
      if (lower.includes(m)) {
        let blurb = '';
        for (const key of Object.keys(cat.blurbs)) {
          if (lower.includes(key) && key.length > 0) blurb = cat.blurbs[key];
        }
        return { categoryId: cat.id, blurb };
      }
    }
  }
  return { categoryId: 'other', blurb: '' };
};

// Parse "Name — Strength — $Price" into parts.
// IMPORTANT: split only on em/en dashes — hyphens are part of names like
// "Semax-Selank Blend", "PT-141", "TB-500", "SS-31".
const parseLabel = (label) => {
  // Strip the price segment first so it isn't mistaken for a strength.
  const priceMatch = label.match(/\$[\d,.]+/);
  const price = priceMatch ? priceMatch[0] : '';
  const withoutPrice = price ? label.replace(price, '').replace(/[—–]\s*$/, '').trim() : label;
  const parts = withoutPrice.split(/[—–]/).map(s => s.trim()).filter(Boolean);
  return {
    name: parts[0] || label,
    strength: parts[1] || '',
    price,
    fullLabel: label,
  };
};

const getProductPhoto = (label) => {
  if (!label) return null;
  const lower = label.toLowerCase();
  // longest match wins so 'cjc-1295 + ipamorelin' beats 'cjc'
  let best = null;
  for (const p of PRODUCT_PHOTOS) {
    if (lower.includes(p.match)) {
      if (!best || p.match.length > best.match.length) best = p;
    }
  }
  return best ? best.src : null;
};

  const hasVariants = Array.isArray(variants) && variants.length > 0;

  const activeVariant = hasVariants ? variants[selectedIdx] : null;
  const display = hasVariants ? activeVariant.parsed : parsed;

  const [hover, setHover] = React.useState(false);

  const cardSelected = hasVariants ? anyVariantSelected : isSelected;
  const active = hover || cardSelected || expanded;

  const panelRef = React.useRef(null);
  const [panelHeight, setPanelHeight] = React.useState(0);

  React.useLayoutEffect(() => {

const PortalCatalog = ({ productOptions, selectedLabels = [], onSelect, inventoryMap = {} }) => {
  const [expandedKey, setExpandedKey] = React.useState(null);

  // Close on Esc.
  React.useEffect(() => {
    if (!expandedKey) return;
    const onKey = (e) => { if (e.key === 'Escape') setExpandedKey(null); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [expandedKey]);
  // Group products into categories
  const grouped = React.useMemo(() => {
    const buckets = {};
    CATEGORY_MAP.forEach(c => { buckets[c.id] = { ...c, items: [] }; });
    buckets.other = { id: 'other', title: 'Other', tint: '#a1a1aa', items: [] };

    productOptions.forEach(label => {
      const { categoryId, blurb } = categorize(label);
      const parsed = parseLabel(label);
      buckets[categoryId].items.push({ parsed, blurb });
    });

    // Auto-collapse: any product with 2+ strengths under the same name becomes
    // a single card with a strength selector at the bottom. Catches Sema /
    // Tirz / Reta as well as SS-31, MOTS, HGH, etc.
    const mgValue = (it) => {
      const m = it.parsed.strength && it.parsed.strength.match(/(\d+(?:\.\d+)?)/);
      return m ? parseFloat(m[1]) : 0;
    };
    Object.values(buckets).forEach(bucket => {
      const byName = {};
      bucket.items.forEach(it => {
        const key = it.parsed.name.toLowerCase().trim();
        (byName[key] = byName[key] || []).push(it);
      });
      const collapsed = [];
      bucket.items.forEach(it => {
        const key = it.parsed.name.toLowerCase().trim();
        const group = byName[key];
        if (!group) return; // already emitted
        if (group.length > 1) {
          group.sort((a, b) => mgValue(a) - mgValue(b));
          const head = group[0];
          collapsed.push({ parsed: head.parsed, blurb: head.blurb, variants: group });
        } else {
          collapsed.push(group[0]);
        }
        delete byName[key];
      });
      bucket.items = collapsed;
    });

    if (buckets.metabolic) {
      // Within Metabolic / Weight Management, surface Semaglutide → Tirzepatide
      // → Retatrutide first (in that order), before 5 Amino, Cagrilintide, KLOW.
      const priority = ['semaglutide', 'tirzepatide', 'retatrutide'];
      const rank = (item) => {
        const lower = item.parsed.fullLabel.toLowerCase();
        const idx = priority.findIndex(p => lower.includes(p));
        return idx === -1 ? 999 : idx;
      };
      buckets.metabolic.items.sort((a, b) => rank(a) - rank(b));
    }

    const order = (window.CATALOG_CATEGORIES || CATEGORY_MAP).map(c => c.id).concat(['other']);
    return order.map(id => buckets[id]).filter(b => b && b.items.length > 0);
  }, [productOptions]);

  return (
    <div>
      {grouped.map(cat => (
        <div key={cat.id} style={{ marginBottom: 44 }}>
          <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              width: 5, height: 22, borderRadius: 3, background: cat.tint,
              boxShadow: `0 0 14px ${cat.tint}80`,
            }} />
            <h3 style={{ fontSize: 18, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.01em' }}>{cat.title}</h3>
            <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>· {cat.items.length}</span>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))',
            gap: 20,
          }}>
            {cat.items.map(({ parsed, blurb, variants }) => (
              <PortalRevealCard
                key={parsed.fullLabel}
                parsed={parsed}
                blurb={blurb}
                tint={cat.tint}
                variants={variants}
                selectedLabels={selectedLabels}
                isSelected={selectedLabels.includes(parsed.fullLabel)}
                onSelect={onSelect}
                onExpand={() => setExpandedKey(parsed.fullLabel)}
                inventoryMap={inventoryMap}
              />
            ))}
          </div>
        </div>
      ))}

      {expandedKey && (() => {
        // Find the item across all buckets.
        let found = null, foundCat = null;
        for (const cat of grouped) {
          const it = cat.items.find(i => i.parsed.fullLabel === expandedKey);
          if (it) { found = it; foundCat = cat; break; }
        }
        if (!found) return null;
        return (
          <div
            onClick={() => setExpandedKey(null)}
            style={{
              position: 'fixed', inset: 0, zIndex: 200,
              background: 'rgba(0,0,0,0.72)', backdropFilter: 'blur(8px)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: 24, animation: 'fadeIn 0.18s ease',
            }}>
            <div onClick={(e) => e.stopPropagation()} style={{ width: '100%', maxWidth: 440, position: 'relative' }}>
              <button
                onClick={() => setExpandedKey(null)}
                aria-label="Close"
                style={{
                  position: 'absolute', top: -44, right: 0,
                  width: 36, height: 36, borderRadius: '50%',
                  background: 'rgba(255,255,255,0.10)', border: '1px solid rgba(255,255,255,0.15)',
                  color: '#fff', cursor: 'pointer', fontSize: 18, lineHeight: 1,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontFamily: 'inherit',
                }}>✕</button>
              <PortalRevealCard
                parsed={found.parsed}
                blurb={found.blurb}
                tint={foundCat.tint}
                variants={found.variants}
                selectedLabels={selectedLabels}
                isSelected={selectedLabels.includes(found.parsed.fullLabel)}
                onSelect={onSelect}
                onClose={() => setExpandedKey(null)}
                expanded={true}
              />
            </div>
          </div>
        );
      })()}
    </div>
  );
};

// ─── Order Form ───────────────────────────────────────────────────────────────
const OrderForm = ({ userData, onOrderPlaced }) => {
  // cart: [{ label, qty }]
  const [cart, setCart] = React.useState([]);
  const [notes, setNotes] = React.useState('');
  // Shipping fields — required at checkout. Prefill from the user's profile
  // when we have it, but always let the client confirm/correct.
  const [shippingAddress, setShippingAddress] = React.useState('');
  const [pickupModal, setPickupModal] = React.useState(null); // 'sj' | 'mh' | null
  const [pickupAcknowledged, setPickupAcknowledged] = React.useState({ sj: false, mh: false });
  const [phone, setPhone] = React.useState('');
  // Payment method — required at checkout. Empty string = not yet chosen.
  // Value is a method id (venmo / paypal / cashapp / card / …).
  const [paymentMethod, setPaymentMethod] = React.useState('');
  // Buyer-visible payment methods (admin-configured, loaded from server with
  // a fallback to the baked-in defaults in payment-config.js).
  const [paymentMethods, setPaymentMethods] = React.useState(
    () => (window.visiblePaymentMethods ? window.visiblePaymentMethods() : [])
  );
  // After an order is placed: { reference, total, methodId, orderIds, reported }
  const [placedOrder, setPlacedOrder] = React.useState(null);
  // Pricelist: load the admin-saved version from the DB on mount (falls back to
  // the baked-in defaults in pricelists.js). plReady flips once it resolves so
  // the catalog recomputes with live prices.
  const [plReady, setPlReady] = React.useState(false);
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      if (window.loadPricelists) { try { await window.loadPricelists(sb); } catch (e) {} }
      if (window.loadPriceOverrides) { try { await window.loadPriceOverrides(sb); } catch (e) {} }
      if (!cancelled) setPlReady(true);
    })();
    return () => { cancelled = true; };
  }, []);
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      if (!window.loadPaymentMethods) return;
      const m = await window.loadPaymentMethods(sb);
      if (!cancelled) setPaymentMethods(window.visiblePaymentMethods(m));
    })();
    return () => { cancelled = true; };
  }, []);
  // Buyer taps "I've sent payment" → flag the order(s) for the seller to verify.
  const reportPayment = async () => {
    if (!placedOrder) return;
    const ids = placedOrder.orderIds || [];
    for (const id of ids) {
      try { await sb.from('orders').update({ payment_status: 'reported' }).eq('id', id); }
      catch (e) { /* payment_status column may not exist yet — non-fatal */ }
    }
    setPlacedOrder(p => p ? { ...p, reported: true } : p);
  };
  // Shipping method — required. Empty string = not yet chosen.
  const [shippingMethod, setShippingMethod] = React.useState('');
  // Coupon code — optional. Validated against the `coupons` Supabase table
  // (loaded once on mount; admin manages them in Admin → Coupons).
  const [couponCode, setCouponCode] = React.useState('');
  const [activeCoupons, setActiveCoupons] = React.useState([]);
  const [clientPastCoupons, setClientPastCoupons] = React.useState([]);
  const [inventoryMap, setInventoryMap] = React.useState({}); // name -> qty
  const [fieldErrors, setFieldErrors] = React.useState({});
  const [success, setSuccess] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  // Pre-checkout reminder modal: gentle nudge about lyophilized peptide form,
  // BAC water requirement, and syringes/wipes accessory pack. Shown ONCE per
  // checkout, only when the cart contains a reconstitution-needed product.
  const [showReminder, setShowReminder] = React.useState(false);
  const reminderConfirmedRef = React.useRef(false);

  // Hydrate shipping fields from the saved profile once it arrives.
  React.useEffect(() => {
    if (userData?.address && !shippingAddress) setShippingAddress(userData.address);
    if (userData?.phone && !phone) setPhone(userData.phone);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [userData?.address, userData?.phone]);

  // Pick the right product list for this client, based on their pricelist
  // setting (set by the coach in the admin profile editor). Falls back to
  // the legacy hardcoded PRODUCTS list if pricelists.js hasn't loaded.
  const productOptions = React.useMemo(() => {
    const key = userData?.profile?.pricelist || 'wholesale';
    let list;
    if (userData?.id && typeof window.getPricelistAsLabelsForClient === 'function') {
      // Apply this client's per-product price overrides (set by the coach in
      // Admin → Pricelist). Falls through to tier prices for anything not overridden.
      list = window.getPricelistAsLabelsForClient(userData.id, key);
    } else if (typeof window.getPricelistAsLabels === 'function') {
      list = window.getPricelistAsLabels(key);
    } else {
      list = PRODUCTS;
    }
    // Show every product on the client's pricelist — whether or not it has a
    // product photo. Items without a photo fall back to the styled vial
    // placeholder (PortalVial), so nothing is hidden from the catalog.
    return list;
  }, [userData?.profile?.pricelist, userData?.id, plReady]);

  const addToCart = (label) => {
    setCart(prev => {
      const existing = prev.find(item => item.label === label);
      if (existing) {
        return prev.map(item => item.label === label ? { ...item, qty: item.qty + 1 } : item);
      }
      return [...prev, { label, qty: 1 }];
    });
  };

  const updateQty = (label, qty) => {
    if (qty < 1) return;
    setCart(prev => prev.map(item => item.label === label ? { ...item, qty } : item));
  };

  const removeFromCart = (label) => {
    setCart(prev => prev.filter(item => item.label !== label));
  };

  const cartLabels = cart.map(c => c.label);

  // Reminder modal: detect what's in the cart so we know whether to show it
  // and which quick-add buttons to expose.
  const cartNeedsReconstitution = cart.some(it =>
    /\b\d+(?:\.\d+)?\s*(?:mg|IU)\b/i.test(it.label)
  );
  const cartHasBacWater     = cart.some(it => /bac water/i.test(it.label));
  const cartHasAccessoryPack = cart.some(it => /accessory pack/i.test(it.label));
  const reminderRelevant = cartNeedsReconstitution && (!cartHasBacWater || !cartHasAccessoryPack);

  // Find a label in productOptions that startsWith the given prefix. Lets us
  // quick-add the right BAC Water / Accessory Pack line (including price suffix).
  const findOptionLabel = (prefix) => {
    const lower = prefix.toLowerCase();
    return productOptions.find(l => l.toLowerCase().startsWith(lower)) || null;
  };

  const submit = async (e) => {
    e.preventDefault();
    if (cart.length === 0 || submitting) return;

    // Pre-checkout reminder: lyophilized form / BAC water / accessory pack.
    // Only fires once per checkout (confirmed via ref so it survives re-render).
    if (reminderRelevant && !reminderConfirmedRef.current) {
      setShowReminder(true);
      return;
    }

    // Validate required shipping fields. We trim and require both — unless
    // the client is picking up / dropping off in person, in which case a
    // shipping address isn't applicable.
    const isPickup = shippingMethod === 'Pickup San Jose' || shippingMethod === 'Pickup Morgan Hill';
    const trimmedAddress = shippingAddress.trim();
    const trimmedPhone = phone.trim();
    const errs = {};
    if (!isPickup) {
      if (!trimmedAddress) errs.address = 'Shipping address is required.';
      else if (trimmedAddress.length < 8) errs.address = 'Please enter a complete shipping address.';
    }
    // Phone: require exactly 10 digits (US format)
    const digitCount = (trimmedPhone.match(/\d/g) || []).length;
    if (!trimmedPhone) errs.phone = 'Phone number is required.';
    else if (digitCount < 10) errs.phone = 'Please enter a valid 10-digit phone number.';
    if (!paymentMethod) errs.payment = 'Please choose a payment method.';
    if (!shippingMethod) errs.shipping = 'Please choose a shipping method.';
    if (Object.keys(errs).length) {
      setFieldErrors(errs);
      return;
    }
    setFieldErrors({});
    setSubmitting(true);

    const insertedOrders = [];
    // 1. Insert one order row per cart line in Supabase.
    //    Real schema is (product, quantity, ordered_at). We try those first and fall
    //    back to (item, qty) in case the schema ever gets renamed.
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        for (const item of cart) {
          // Per-order details captured at checkout. Until the 2026_order_details
          // migration was added, all of these were collected on the form and
          // then thrown away — admin only saw product/qty/notes. Now persisted.
          const orderDetails = {
            client_id: user.id,
            notes: notes || null,
            status: 'pending',
          payment_method:   ((paymentMethods.find(m => m.id === paymentMethod) || {}).label) || paymentMethod || null,
            shipping_method:  shippingMethod || null,
            shipping_address: shippingAddress.trim() || userData?.address || null,
            shipping_cost:    Number.isFinite(shippingCost) ? shippingCost : null,
            phone_at_order:   phone.trim() || userData?.phone || null,
            coupon_code:      couponActive ? matchedCoupon.code : (couponCode.trim() || null),
          };
          const tryInsert = (lineCols) =>
            sb.from('orders').insert({ ...orderDetails, ...lineCols }).select().single();

          // 1st try: current schema (product/quantity) + new detail columns.
          let { data, error } = await tryInsert({ product: item.label, quantity: item.qty });
          // 2nd try: legacy line-item column names (item/qty).
          if (error && /column .* does not exist/i.test(error.message || '')) {
            const retry = await tryInsert({ item: item.label, qty: item.qty });
            data = retry.data; error = retry.error;
          }
          // 3rd try: order_details migration not yet applied — fall back to a
          // minimal insert so checkout still works. Admin will see product/qty
          // only for these orders, same as before.
          if (error && /column .* does not exist/i.test(error.message || '')) {
            const minimal = { client_id: user.id, notes: notes || null, status: 'pending' };
            let r = await sb.from('orders')
              .insert({ ...minimal, product: item.label, quantity: item.qty })
              .select().single();
            if (r.error && /column .* does not exist/i.test(r.error.message || '')) {
              r = await sb.from('orders')
                .insert({ ...minimal, item: item.label, qty: item.qty })
                .select().single();
            }
            data = r.data; error = r.error;
          }
          if (error) throw error;
          insertedOrders.push(data);
        }
      } else {
        console.warn('Order placed without a signed-in user; skipping DB insert.');
      }
    } catch (err) {
      console.error('Order insert failed:', err);
    }

    // Compute a payment reference + amount due for the confirmation screen.
    const chosenM = paymentMethods.find(m => m.id === paymentMethod);
    const refPrefix = (window.PFB_PAYMENT && window.PFB_PAYMENT.refPrefix) || 'PFB';
    const refBase = insertedOrders[0] && insertedOrders[0].id;
    const reference = refBase
      ? `${refPrefix}-${String(refBase).replace(/-/g, '').slice(0, 6).toUpperCase()}`
      : `${refPrefix}-${String(Date.now()).slice(-6)}`;
    const amountDue = Number.isFinite(cartTotal) ? cartTotal : 0;

    // 1b. Decrement inventory for each successfully inserted order. Best-
    //     effort: a stock-update failure must NOT block the checkout flow.
    //     The inventory_applied flag prevents double-counting if Admin later
    //     marks the same order 'completed'.
    if (insertedOrders.length && typeof window.decrementInventoryForOrder === 'function') {
      for (const o of insertedOrders) {
        try {
          const res = await window.decrementInventoryForOrder(o);
          if (!res.ok) console.warn('Inventory decrement failed:', res.error);
        } catch (e) {
          console.warn('Inventory decrement threw:', e);
        }
      }
    }

    // 2. Email/SMS notification via Formspree — single message with full cart
    try {
      const summary = cart.map(it => `• ${it.label} × ${it.qty}`).join('\n');
      const totalItems = cart.reduce((s, it) => s + it.qty, 0);
      await fetch('https://formspree.io/f/mnjwvgan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: `New Order: ${cart.length} item${cart.length > 1 ? 's' : ''} (${totalItems} total)`,
          client_name: userData?.name && userData.name !== userData?.email ? userData.name : '(no name on file)',
          client_email: userData?.email || 'Unknown',
          client_phone: phone.trim() || userData?.phone || '(no phone on file)',
          shipping_address: shippingAddress.trim() || userData?.address || '(no address on file — please contact client)',
          order_summary: summary,
          item_count: cart.length,
          total_items: totalItems,
          notes: notes || '(none)',
          payment_method: (chosenM && chosenM.label) || paymentMethod,
          order_reference: reference,
          shipping_method: shippingMethod,
          shipping_cost: `$${shippingCost.toFixed(2)}`,
          coupon_code: couponActive ? `${matchedCoupon.code} (${couponLabel}; saved $${couponSavings.toFixed(2)})` : (couponCode.trim() || '(none)'),
          subtotal: `$${subtotalEffective.toFixed(2)}`,
          order_total: `$${cartTotal.toFixed(2)}`,
          submitted_at: new Date().toLocaleString(),
        }),
      });
    } catch (err) {
      console.error('Notification failed:', err);
    }

    // Push each cart line into history
    const historyStatus = (chosenM && chosenM.kind === 'invoice') ? 'Invoice sent' : 'Awaiting payment';
    cart.forEach((item, i) => {
      onOrderPlaced({
        id: insertedOrders[i]?.id,
        item: item.label,
        qty: item.qty,
        notes,
        status: historyStatus,
      });
    });
    // Record the placed order so the confirmation screen can show payment
    // instructions (amount + reference + handles + “I've sent payment”).
    setPlacedOrder({
      reference,
      total: amountDue,
      methodId: paymentMethod,
      orderIds: insertedOrders.map(o => o && o.id).filter(Boolean),
      reported: false,
    });
    setCart([]); setNotes(''); setPaymentMethod(''); setShippingMethod(''); setCouponCode('');
    setSubmitting(false);
    setSuccess(true);
  };

  // ─── Coupon + shipping pricing ───────────────────────────────────────
  // Coupons come from Supabase (`coupons` table). Each has:
  //   kind:  'percent' | 'fixed'    → amount is % off (0–100) or $ off
  //   scope: 'all' | 'retatrutide'  → entire cart, or Retatrutide line items
  // Codes are case-insensitive and stored lowercased server-side.
  React.useEffect(() => {
    (async () => {
      const { data, error } = await sb.from('coupons').select('*').eq('active', true);
      if (error) {
        console.warn('Could not load coupons:', error.message);
        return;
      }
      setActiveCoupons(data || []);
      // Load inventory levels
      try {
        const { data: inv } = await sb.from('inventory').select('name,qty');
        const map = {};
        (inv || []).forEach(r => { map[r.name.trim().toLowerCase()] = Number(r.qty); });
        setInventoryMap(map);
      } catch (e) { console.warn('inventory load failed:', e); }
      // Load client's past coupon codes for one_time_use enforcement
      if (userData && userData.id) {
        try {
          const { data: pastOrders } = await sb.from('orders').select('coupon_code').eq('client_id', userData.id);
          const usedCodes = (pastOrders || [])
            .map(o => (o.coupon_code || '').toLowerCase().split(' ')[0]) // strip "(label; saved $x)" suffix
            .filter(Boolean);
          setClientPastCoupons(usedCodes);
        } catch (e) {}
      }
    })();
  }, []);

  const matchedCoupon = React.useMemo(() => {
    const entered = couponCode.trim().toLowerCase();
    if (!entered) return null;
    return activeCoupons.find(c => (c.code || '').toLowerCase() === entered) || null;
  }, [couponCode, activeCoupons]);

  // Subtotal needed for min_order check — compute early (before priceFor, using raw prices)
  const rawSubtotal = React.useMemo(() =>
    cart.reduce((sum, item) => {
      const m = item.label.match(/\$([\d,.]+)/);
      return sum + (m ? parseFloat(m[1].replace(/,/g, '')) : 0) * item.qty;
    }, 0)
  , [cart]);

  const couponError = React.useMemo(() => {
    if (!matchedCoupon) return couponCode.trim() ? 'Invalid code.' : null;
    if (matchedCoupon.one_time_use && clientPastCoupons.includes((matchedCoupon.code || '').toLowerCase()))
      return 'This code has already been used on your account.';
    if (matchedCoupon.min_order > 0 && rawSubtotal < matchedCoupon.min_order)
      return `Minimum order of $${matchedCoupon.min_order.toFixed(0)} required.`;
    return null;
  }, [matchedCoupon, couponCode, clientPastCoupons, rawSubtotal]);

  const couponActive = !!matchedCoupon && !couponError;

  const isRetatrutideLabel = (label) => /\bretatrutide\b/i.test(label || '');
  const lineMatchesCoupon = (label) => {
    if (!matchedCoupon) return false;
    if (matchedCoupon.scope === 'all') return true;
    if (matchedCoupon.scope === 'retatrutide') return isRetatrutideLabel(label);
    return false;
  };

  // Per-line effective price.
  //  - Percent coupons discount each matching line directly (we show strikethrough).
  //  - Fixed coupons subtract a flat $ amount from the matching subtotal at
  //    the bottom — line prices stay the same.
  const priceFor = (label) => {
    const m = label.match(/\$([\d,.]+)/);
    const orig = m ? parseFloat(m[1].replace(/,/g, '')) : 0;
    if (matchedCoupon && matchedCoupon.kind === 'percent' && lineMatchesCoupon(label)) {
      const pct = parseFloat(matchedCoupon.amount) || 0;
      const eff = Math.max(0, orig * (1 - pct / 100));
      return { orig, eff, discounted: true };
    }
    return { orig, eff: orig, discounted: false };
  };

  const SHIPPING_OPTIONS = [
    { value: 'Regular Shipping ($7)',   cost: 7,  label: 'Regular Shipping — $7' },
    { value: 'Priority Shipping ($15)', cost: 15, label: 'Priority Shipping — $15' },
    { value: 'Pickup San Jose',         cost: 0,  label: 'Pickup San Jose' },
    { value: 'Pickup Morgan Hill',       cost: 0,  label: 'Pickup Morgan Hill' },
  ];
  const shippingCost = SHIPPING_OPTIONS.find(o => o.value === shippingMethod)?.cost ?? 0;

  // Subtotals
  const subtotalOriginal = cart.reduce((sum, item) => sum + priceFor(item.label).orig * item.qty, 0);
  const subtotalAfterLineDiscounts = cart.reduce((sum, item) => sum + priceFor(item.label).eff * item.qty, 0);

  // Fixed-$ coupons: apply once to the matching subtotal, clamped so it can
  // never push the order negative.
  let fixedDiscount = 0;
  if (matchedCoupon && matchedCoupon.kind === 'fixed') {
    const matchingSubtotal = cart.reduce((sum, item) => {
      if (!lineMatchesCoupon(item.label)) return sum;
      return sum + priceFor(item.label).orig * item.qty;
    }, 0);
    fixedDiscount = Math.min(matchingSubtotal, parseFloat(matchedCoupon.amount) || 0);
  }

  // Apply max_discount cap if set
  const rawSavingsBeforeCap = subtotalOriginal - Math.max(0, subtotalAfterLineDiscounts - fixedDiscount);
  const maxDiscountCap = (matchedCoupon && matchedCoupon.max_discount > 0) ? matchedCoupon.max_discount : Infinity;
  const cappedSavings = Math.min(rawSavingsBeforeCap, maxDiscountCap);
  const subtotalEffective = Math.max(0, subtotalOriginal - cappedSavings);
  const couponSavings = cappedSavings;
  const cartTotal = subtotalEffective + shippingCost;
  const hasPrices = cart.length > 0 && cart.every(item => /\$[\d,.]+/.test(item.label));

  // Human-readable summary of the matched coupon (for the totals row).
  const couponLabel = matchedCoupon
    ? `${matchedCoupon.kind === 'percent' ? matchedCoupon.amount + '%' : '$' + matchedCoupon.amount} off${matchedCoupon.scope === 'retatrutide' ? ' Retatrutide' : ''}${matchedCoupon.max_discount > 0 ? ' (max $' + matchedCoupon.max_discount + ')' : ''}`
    : '';
  // Whether the matched coupon couldn't apply because no qualifying items
  // are in the cart (e.g. Retatrutide-only coupon but no Retatrutide line).
  const couponHasNoTarget = couponActive && couponSavings === 0;

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap', marginBottom: 28 }}>
        <div>
          <h2 style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.025em', marginBottom: 6 }}>Order Form</h2>
          <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.45)' }}>Tap any product to add it to your cart.</p>
        </div>
        {cart.length > 0 && (
          <a href="#cart" style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '10px 18px', borderRadius: 980,
            background: 'rgba(41,151,255,0.12)', border: '1px solid rgba(41,151,255,0.45)',
            color: '#2997ff', fontSize: 14, fontWeight: 500, textDecoration: 'none',
          }}>
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <path d="M2 3h2l2 9h9l2-7H5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              <circle cx="7" cy="15.5" r="1.2" fill="currentColor"/>
              <circle cx="14" cy="15.5" r="1.2" fill="currentColor"/>
            </svg>
            <span>{cart.reduce((s, c) => s + c.qty, 0)} in cart · review</span>
          </a>
        )}
      </div>

      {/* Catalog grid */}
      <PortalCatalog
        productOptions={productOptions}
        selectedLabels={cartLabels}
        onSelect={addToCart}
        inventoryMap={inventoryMap}
      />

      {/* Cart / Checkout panel */}
      <div id="cart" style={{ scrollMarginTop: 24 }}>
        {cart.length > 0 && (
          <div className="card" style={{ maxWidth: 760, marginTop: 40, padding: 28 }}>

// ─── Nutrition Plan ───────────────────────────────────────────────────────────
const NutritionPlan = ({ plan, userId }) => {
  const [activeDay, setActiveDay] = React.useState(0);
  const [activeWeek, setActiveWeek] = React.useState(0);
  const picksKey = `pfb_meal_picks_${userId || 'anon'}_${plan?.id || 'noplan'}`;
  const [picks, setPicks] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(picksKey) || '{}'); } catch { return {}; }
  });
  const setPick = (dayIdx, mealIdx, value) => {
    setPicks(p => {
      const k = `${dayIdx}_${mealIdx}`;
      const next = { ...p };
      if (value == null) delete next[k]; else next[k] = value;
      try { localStorage.setItem(picksKey, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const canChoose = !!plan?.settings?.clientCanChoose;

  // Group flat days into weeks. Builder pushes 2-week plans as "Week 2 · Monday".
  const parseDayLabel = (label) => {
    const m = /^Week\s+(\d+)\s*[·:|\-–]\s*(.+)$/i.exec((label || '').trim());
    if (m) return { week: parseInt(m[1], 10), day: m[2].trim() };
    return { week: null, day: (label || '').trim() };
  };
  const weekGroups = React.useMemo(() => {
    const groups = []; const map = {};
    (plan.days || []).forEach((d, i) => {
      const { week } = parseDayLabel(d && d.day);
      const key = week || 1;
      if (!map[key]) { map[key] = { week: key, indices: [] }; groups.push(map[key]); }
      map[key].indices.push(i);
    });
    groups.sort((a, b) => a.week - b.week);
    return groups;
  }, [plan.days]);
  const multiWeek = weekGroups.length > 1;
  const currentGroup = weekGroups[activeWeek] || weekGroups[0] || { indices: [] };
  const selectWeek = (wi) => {
    setActiveWeek(wi);
    const first = (weekGroups[wi] && weekGroups[wi].indices[0]);
    if (first != null) setActiveDay(first);
  };

  const macros = [
    { label: 'Calories', value: plan.macros.calories, unit: 'kcal', color: '#0066cc' },
    { label: 'Protein', value: plan.macros.protein, unit: 'g', color: '#34c759' },
    { label: 'Carbs', value: plan.macros.carbs, unit: 'g', color: '#ff9f0a' },
    { label: 'Fat', value: plan.macros.fat, unit: 'g', color: '#ff3b30' },
  ];

  return (
    <div className="fade-in">
      <h2 style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.025em', marginBottom: 4 }}>Nutrition Plan</h2>
      <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.45)', marginBottom: 28 }}>Goal: {plan.goal}</p>

      {/* Macro cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 12, marginBottom: 28 }}>
        {macros.map(m => (
          <div key={m.label} className="card" style={{ padding: '20px', textAlign: 'center' }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: m.color, letterSpacing: '-0.03em', lineHeight: 1 }}>{m.value}</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>{m.unit}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: '#f5f5f7', marginTop: 6 }}>{m.label}</div>
          </div>
        ))}
      </div>

      {/* Week selector (only for multi-week plans) + day tabs */}
      {Array.isArray(plan.days) && plan.days.length > 0 ? (
        <React.Fragment>
          {multiWeek && (
            <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
              {weekGroups.map((g, wi) => (
                <button key={g.week} onClick={() => selectWeek(wi)}
                  style={{
                    borderRadius: 12, padding: '9px 20px', fontSize: 13.5, cursor: 'pointer',
                    fontFamily: 'inherit', fontWeight: 600,
                    border: `1px solid ${activeWeek === wi ? 'rgba(0,102,204,0.6)' : 'rgba(255,255,255,0.1)'}`,
                    background: activeWeek === wi ? 'rgba(0,102,204,0.16)' : 'transparent',
                    color: activeWeek === wi ? '#4a9eff' : 'rgba(255,255,255,0.6)',
                    transition: 'all 0.12s',
                  }}>
                  Week {g.week}
                </button>
              ))}
            </div>
          )}
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 20 }}>
            {currentGroup.indices.map((i) => {
              const d = plan.days[i];
              const dayName = parseDayLabel(d && d.day).day || `Day ${i+1}`;
              return (
                <button key={(d && d.day) || i} onClick={() => setActiveDay(i)}
                  style={{
                    borderRadius: 980, padding: '7px 16px', fontSize: 13, cursor: 'pointer', border: 'none',
                    fontFamily: 'inherit', fontWeight: activeDay === i ? 600 : 400,
                    background: activeDay === i ? '#0066cc' : 'rgba(255,255,255,0.07)',
                    color: activeDay === i ? '#fff' : 'rgba(255,255,255,0.7)',
                    boxShadow: 'none',
                    transition: 'all 0.12s',
                  }}>
                  {dayName.slice(0, 3)}
                </button>
              );
            })}
          </div>

          {plan.days[activeDay] && (
            <div className="card">
              <h3 style={{ fontSize: 17, fontWeight: 600, marginBottom: 16, color: '#f5f5f7' }}>
                {multiWeek && <span style={{ color: 'rgba(255,255,255,0.4)', fontWeight: 500 }}>Week {currentGroup.week} · </span>}
                {parseDayLabel(plan.days[activeDay].day).day || `Day ${activeDay+1}`}
              </h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {(plan.days[activeDay].meals || []).map((meal, i) => {
                  // Legacy string meal
                  if (typeof meal === 'string') {
                    return (
                      <div key={i} style={{
                        display: 'flex', alignItems: 'flex-start', gap: 12,
                        padding: '12px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 10,
                      }}>
                        <div style={{
                          width: 24, height: 24, borderRadius: '50%', background: '#0066cc',
                          color: '#fff', fontSize: 11, fontWeight: 700,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          flexShrink: 0, marginTop: 1,
                        }}>{i + 1}</div>
                        <span style={{ fontSize: 15, color: '#f5f5f7', lineHeight: 1.5 }}>{meal}</span>
                      </div>
                    );
                  }
                  const items = (meal && meal.items) || [];
                  const summary = items
                    .filter(it => it && (it.ingredient || it.qty))
                    .map(it => `${it.qty || ''}${it.unit || ''} ${it.ingredient || ''}`.trim())
                    .join(', ');

                  // Default (coach-assigned) view of this meal
                  const defaultView = {
                    recipe_id: meal.recipe_id || null,
                    name: (meal.recipe_name) || (meal.name) || `Meal ${i+1}`,
                    photo: meal.recipe_photo || '',
                    prep: meal.recipe_prep || 0,
                    calories: items.reduce((s,it)=>s+(parseFloat(it.calories)||0),0),
                    protein:  items.reduce((s,it)=>s+(parseFloat(it.protein)||0),0),
                    carbs:    items.reduce((s,it)=>s+(parseFloat(it.carbs)||0),0),
                    fat:      items.reduce((s,it)=>s+(parseFloat(it.fat)||0),0),
                    isDefault: true,
                    summary,
                    items,
                  };

                  const alts = (meal.alternatives || []);
                  const hasAlts = canChoose && alts.length > 0;
                  const pickKey = `${activeDay}_${i}`;
                  const pickedId = picks[pickKey] || null;
                  const pickedAlt = pickedId ? alts.find(a => a.recipe_id === pickedId) : null;
                  const view = pickedAlt ? {
                    recipe_id: pickedAlt.recipe_id, name: pickedAlt.recipe_name,
                    photo: pickedAlt.recipe_photo, prep: pickedAlt.recipe_prep,
                    calories: pickedAlt.calories, protein: pickedAlt.protein,
                    carbs: pickedAlt.carbs, fat: pickedAlt.fat,
                    isDefault: false, summary: '', items: [],
                  } : defaultView;

                  return (
                    <div key={i} style={{ padding: '14px 16px', background: 'rgba(255,255,255,0.05)', borderRadius: 12 }}>
                      <div style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                        <div style={{
                          width: 24, height: 24, borderRadius: '50%', background: '#0066cc',
                          color: '#fff', fontSize: 11, fontWeight: 700,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          flexShrink: 0, marginTop: 4,
                        }}>{i + 1}</div>
                        <div style={{ flex:1, minWidth:0 }}>

                            <div style={{ marginTop:14, paddingTop:12, borderTop:'1px solid rgba(255,255,255,0.08)' }}>
                              <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'0.06em', fontWeight:600, marginBottom:8 }}>
                                Choose what you'll eat

                                <button
                                  onClick={()=>setPick(activeDay, i, null)}
                                  style={{

                                    padding:'8px 12px', borderRadius:10, cursor:'pointer', fontFamily:'inherit',
                                    border: !pickedAlt ? '1.5px solid #0066cc' : '1px solid rgba(255,255,255,0.10)',
                                    background: !pickedAlt ? 'rgba(0,102,204,0.12)' : 'rgba(255,255,255,0.03)',

                                  <span style={{ fontSize:10, color:'rgba(255,255,255,0.5)', fontFamily:'ui-monospace,monospace' }}>
                                    {Math.round(defaultView.calories)}kcal · P{Math.round(defaultView.protein)}
                                  </span>
                                </button>
                                {alts.map(alt => {
                                  const sel = pickedId === alt.recipe_id;
                                  return (
                                    <button key={alt.recipe_id} onClick={()=>setPick(activeDay, i, alt.recipe_id)}
                                      style={{
                                        display:'inline-flex', flexDirection:'column', alignItems:'flex-start', gap:2,
                                        padding:'8px 12px', borderRadius:10, cursor:'pointer', fontFamily:'inherit',
                                        border: sel ? '1.5px solid #0066cc' : '1px solid rgba(255,255,255,0.10)',
                                        background: sel ? 'rgba(0,102,204,0.12)' : 'rgba(255,255,255,0.03)',
                                        color:'#f5f5f7', textAlign:'left',
                                      }}>
                                      <span style={{ fontSize:12, fontWeight:600 }}>
                                        {sel && '✓ '}{alt.recipe_name}
                                      </span>
                                      <span style={{ fontSize:10, color:'rgba(255,255,255,0.5)', fontFamily:'ui-monospace,monospace' }}>
                                        {Math.round(alt.calories||0)}kcal · P{Math.round(alt.protein||0)}

                {(!plan.days[activeDay].meals || plan.days[activeDay].meals.length === 0) && (
                  <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.4)', textAlign: 'center', padding: 16 }}>
                    No meals planned for this day yet.

        </React.Fragment>
      ) : (
        <div className="card" style={{ textAlign: 'center', padding: 40 }}>
          <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.55)', lineHeight: 1.5 }}>
            Your macro targets are set above. Your specialist will add a full meal plan here soon.

    </div>
  );
};

// ─── Blood Work Upload ─────────────────────────────────────────────────────────
const BloodWork = ({ userId, files, onUpload }) => {
  const [dragging, setDragging] = React.useState(false);
  const [newFile, setNewFile] = React.useState(null);
  const [error, setError] = React.useState('');
  const [uploading, setUploading] = React.useState(false);
  const inputRef = React.useRef();

  const handleFile = async (file) => {
    if (!file) return;
    setError('');
    setUploading(true);
    try {
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `${userId}/${Date.now()}_${safeName}`;
      const { error: upErr } = await sb.storage.from('bloodwork').upload(path, file);
      if (upErr) throw upErr;
      const { error: dbErr } = await sb.from('bloodwork_files').insert({
        client_id: userId,
        filename: file.name,
        storage_path: path,
        uploaded_by: userId,
      });
      if (dbErr) throw dbErr;
      setNewFile(file.name);
      onUpload(file.name);
    } catch (err) {
      console.error('Upload failed:', err);
      setError(err.message || 'Upload failed.');
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="fade-in">
      <h2 style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.025em', marginBottom: 6 }}>Blood Work</h2>
      <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.45)', marginBottom: 28 }}>Upload lab results for review by your specialist.</p>

      {/* Upload zone */}
      <div
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
        style={{
          border: `2px dashed ${dragging ? '#2997ff' : 'rgba(255,255,255,0.12)'}`,
          borderRadius: 16, padding: '48px 24px', textAlign: 'center',
          background: dragging ? 'rgba(41,151,255,0.07)' : 'rgba(255,255,255,0.03)',
          cursor: 'pointer', transition: 'all 0.15s', marginBottom: 24,
        }}>
        <input ref={inputRef} type="file" accept=".pdf,image/*" style={{ display: 'none' }}
          onChange={e => handleFile(e.target.files[0])} />
        <div style={{
          width: 52, height: 52, borderRadius: '50%', background: 'rgba(0,102,204,0.08)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          margin: '0 auto 16px',
        }}>
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 14V4M7 8l4-4 4 4" stroke="#0066cc" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M4 16v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1" stroke="#0066cc" strokeWidth="1.7" strokeLinecap="round"/>
          </svg>
        </div>
        <p style={{ fontSize: 16, fontWeight: 500, color: '#f5f5f7', marginBottom: 6 }}>Upload lab results</p>
        <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)' }}>PDF or image · Drag & drop or click to browse</p>
      </div>

      {newFile && !error && (
        <div style={{
          background: 'rgba(52,199,89,0.09)', border: '1px solid rgba(52,199,89,0.25)',
          borderRadius: 10, padding: '12px 16px', marginBottom: 20,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8" stroke="#1a8a3c" strokeWidth="1.5"/>
            <path d="M5.5 9l2.5 2.5 4-4" stroke="#1a8a3c" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span style={{ fontSize: 14, color: '#1a8a3c' }}><strong>{newFile}</strong> uploaded successfully.</span>
        </div>
      )}

      {error && (
        <div style={{
          background: 'rgba(255,59,48,0.10)', border: '1px solid rgba(255,59,48,0.3)',

      {uploading && (
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>

// ─── Portal Shell ─────────────────────────────────────────────────────────────
const Portal = ({ userId, onLogout }) => {
  const [activeTab, setActiveTab] = React.useState('order');
  const [userData, setUserData] = React.useState(null);
  const [loadError, setLoadError] = React.useState('');
  const [unread, setUnread] = React.useState({});  // { workout: [ids], nutrition: [ids] }
  const [quizSkipped, setQuizSkipped] = React.useState(false);

  React.useEffect(() => {
    if (userData?.id) {
      try {
        setQuizSkipped(localStorage.getItem(`pfb_skip_onboarding_${userData.id}`) === '1');
      } catch {}
    }
  }, [userData?.id]);

  // Map notification kind → tab id
  const NOTIF_TAB = { workout_updated: 'workout', nutrition_updated: 'nutrition' };

  // Load unread notifications
  const loadNotifications = React.useCallback(async () => {
    try {
      const { data } = await sb.from('client_notifications')
        .select('id, kind').eq('client_id', userId).is('read_at', null);
      const map = {};
      (data || []).forEach(n => {
        const tab = NOTIF_TAB[n.kind];
        if (!tab) return;
        if (!map[tab]) map[tab] = [];
        map[tab].push(n.id);
      });
      setUnread(map);
    } catch (e) { /* table may not exist yet — silent */ }
  }, [userId]);
  React.useEffect(() => { if (userId) loadNotifications(); }, [userId, loadNotifications]);

  // Wrapper that marks notifications for a tab as read
  const switchTab = async (tabId) => {
    setActiveTab(tabId);
    const ids = unread[tabId];
    if (ids && ids.length) {
      setUnread(u => { const n = {...u}; delete n[tabId]; return n; });
      try { await sb.from('client_notifications').update({ read_at: new Date().toISOString() }).in('id', ids); } catch {}
    }
  };

  // Load all data for this client from Supabase
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      let step = 'starting';
      try {
        // First, fetch by id (the normal case for already-linked clients)
        let profileRow = null;
        step = 'lookup-by-id';
        const idLookup = await sb.from('clients').select('*').eq('id', userId).maybeSingle();
        if (idLookup.error) throw idLookup.error;
        if (idLookup.data) {
          profileRow = idLookup.data;
        } else {
          // Possibly an invited client whose clients row was inserted with a different
          // generated uuid. Find their row by email and re-key it to auth.uid().
          step = 'get-auth-user';
          const { data: { user } } = await sb.auth.getUser();
          const email = user?.email;
          if (email) {
            step = 'lookup-by-email';
            const byEmail = await sb.from('clients').select('*').eq('email', email).maybeSingle();
            if (byEmail.error) throw byEmail.error;
            if (byEmail.data) {
              const oldId = byEmail.data.id;
              if (oldId !== userId) {
                step = 'rekey-update';
                // Re-key: update the clients.id to match auth.uid().
                const { error: rkErr } = await sb.from('clients')
                  .update({ id: userId }).eq('id', oldId);
                if (rkErr) {
                  console.warn('Re-key failed, using existing row:', rkErr);
                  profileRow = byEmail.data;
                } else {
                  step = 'rekey-refetch';
                  const refetch = await sb.from('clients').select('*').eq('id', userId).maybeSingle();
                  profileRow = refetch.data || { ...byEmail.data, id: userId };
                }
              } else {
                profileRow = byEmail.data;
              }
            } else {
              step = 'create-profile';
              // Brand-new auth user with no matching clients row at all — create one.
              const meta = user?.user_metadata || {};
              const { error: createErr } = await sb.from('clients').insert({
                id: userId,
                email,
                name: meta.name || email,
                phone: meta.phone || null,
                status: 'active',
              });
              if (createErr) throw createErr;
              step = 'create-refetch';
              const refetch = await sb.from('clients').select('*').eq('id', userId).maybeSingle();
              if (!refetch.data) throw new Error('Created profile but could not read it back.');
              profileRow = refetch.data;
            }
          }
        }
        if (!profileRow) throw new Error('Could not load your profile.');
        const profileId = profileRow.id;

        step = 'load-related-data';
        const [ordersRes, nutritionRes, workoutRes, bloodworkRes] = await Promise.all([
          sb.from('orders').select('*').eq('client_id', profileId).order('ordered_at', { ascending: false }),
          sb.from('nutrition_plans').select('*').eq('client_id', profileId).eq('active', true).order('created_at', { ascending: false }).limit(1),
          sb.from('workout_plans').select('*').eq('client_id', profileId).eq('active', true).order('created_at', { ascending: false }).limit(1),
          sb.from('bloodwork_files').select('*').eq('client_id', profileId).order('uploaded_at', { ascending: false }),
        ]);
        if (cancelled) return;

        const profileRes = { data: profileRow };

        if (profileRes.error) throw profileRes.error;

        // Map Supabase rows → shape the rest of the portal expects.
        // Display reflects BOTH fulfillment (status) and payment (payment_status).
        const displayStatus = (o) => {
          const s = o.status || 'pending';
          if (s === 'shipped') return 'In Transit';
          if (s === 'completed' || s === 'delivered') return 'Delivered';
          if (s === 'cancelled') return 'Cancelled';
          if (s === 'paid') return 'Processing';      // legacy (pre payment_status)
          if (s === 'invoiced') return 'Invoice sent'; // legacy
          const pay = o.payment_status;
          if (pay === 'paid') return 'Processing';
          if (pay === 'reported') return 'Payment review';
          if (pay === 'invoiced') return 'Invoice sent';
          return 'Awaiting payment';
        };
        const orders = (ordersRes.data || []).map(o => ({
          id: o.id,
          date: o.ordered_at ? o.ordered_at.split('T')[0] : '',
          item: o.product,
          qty: o.quantity,
          status: displayStatus(o),
        }));

        const np = (nutritionRes.data || [])[0];
        const nutrition = np ? {
          id: np.id,
          goal: np.title || 'Current Plan',
          macros: {
            calories: np.daily_calories || 0,
            protein: np.protein_g || 0,
            carbs: np.carbs_g || 0,
            fat: np.fats_g || 0,
          },
          days: Array.isArray(np.plan_data) ? np.plan_data : [],
          settings: (np.meal_settings && typeof np.meal_settings === 'object') ? np.meal_settings : {},
        } : null;

        const wp = (workoutRes.data || [])[0];
        const workout = wp ? {
          goal: wp.title || 'Current Program',
          days: Array.isArray(wp.plan_data) ? wp.plan_data : [],
        } : null;

        const bloodwork = (bloodworkRes.data || []).map(b => b.filename);

        setUserData({
          id: profileRes.data.id,
          name: profileRes.data.name || profileRes.data.email,
          email: profileRes.data.email,
          phone: profileRes.data.phone,
          address: profileRes.data.address,
          profile: profileRes.data,
          onboardedAt: profileRes.data.onboarded_at || null,
          orders, nutrition, workout, bloodwork,
        });
      } catch (err) {
        console.error('Load failed at step:', step, err);
        if (!cancelled) {
          const detail = [
            `Step: ${step}`,
            err?.message && `Message: ${err.message}`,
            err?.code && `Code: ${err.code}`,
            err?.details && `Details: ${err.details}`,
            err?.hint && `Hint: ${err.hint}`,
          ].filter(Boolean).join('\n');
          setLoadError(detail || 'Failed to load your data.');
        }
      }
    })();
    return () => { cancelled = true; };
  }, [userId]);

  if (loadError) {
    return (
      <div style={{ minHeight: '100vh', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
        <div className="card" style={{ maxWidth: 480, textAlign: 'left' }}>
          <h2 style={{ fontSize: 20, marginBottom: 8, textAlign: 'center' }}>Couldn't load your data</h2>
          <pre style={{
            fontSize: 12, color: 'rgba(255,255,255,0.7)',
            background: 'rgba(255,255,255,0.04)',
            padding: 12, borderRadius: 8,
            whiteSpace: 'pre-wrap', wordBreak: 'break-word',
            marginBottom: 20, fontFamily: 'SF Mono, Menlo, monospace', lineHeight: 1.5,
          }}>{loadError}</pre>
          <button className="btn-blue" onClick={onLogout} style={{ width: '100%' }}>Sign out</button>
        </div>
      </div>
    );
  }

  if (!userData) {
    return (
      <div style={{ minHeight: '100vh', background: '#0a0a0a', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.4)' }}>
        Loading…
      </div>
    );
  }

  // First-time client: show onboarding quiz before the portal (unless they skipped)
  const skipKey = `pfb_skip_onboarding_${userData.id}`;

  if (!userData.onboardedAt && !quizSkipped && window.OnboardingQuiz) {
    const Quiz = window.OnboardingQuiz;
    return (
      <Quiz
        clientId={userData.id}
        clientName={userData.name}
        onComplete={(profile) => {
          try { localStorage.removeItem(skipKey); } catch {}
          setUserData({
            ...userData,
            profile,
            onboardedAt: profile.onboarded_at || new Date().toISOString(),
          });
        }}
        onSkip={() => {
          try { localStorage.setItem(skipKey, '1'); } catch {}
          setQuizSkipped(true);
        }}
        onSignOut={onLogout}
      />
    );
  }

  const showOnboardingReminder = !userData.onboardedAt && quizSkipped;
  const resumeOnboarding = () => {
    try { localStorage.removeItem(skipKey); } catch {}
    setQuizSkipped(false);
  };

  const tabs = [
    { id: 'order',    label: 'Order Form',        icon: icons.order },
    { id: 'history',  label: 'Purchase History',   icon: icons.history },
    { id: 'nutrition',label: 'Nutrition Plan',     icon: icons.nutrition },
    { id: 'workout',  label: 'Workout Plan',       icon: icons.workout },
    { id: 'weighin',  label: 'Weekly Weigh-In',    icon: icons.weighin },
    { id: 'blood',    label: 'Blood Work',         icon: icons.blood },
    { id: 'peptides', label: 'Peptide Library',    icon: icons.peptides },
    { id: 'calculator', label: 'Reconstitution Calculator', icon: icons.calculator },
  ];

  const addOrder = (order) => {
    // Optimistically add to UI; OrderForm has already inserted to Supabase
    const newOrder = {
      id: order.id || `tmp-${Date.now()}`,
      date: new Date().toISOString().split('T')[0],
      status: order.status || 'Awaiting payment',
      item: order.item,
      qty: order.qty,
    };
    setUserData(d => ({ ...d, orders: [newOrder, ...d.orders] }));
  };

  const addFile = (name) => {
    setUserData(d => ({ ...d, bloodwork: [name, ...d.bloodwork] }));
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: '#0a0a0a' }}>
      {/* Sidebar */}
      <aside className="sidebar" style={{
        width: 260, flexShrink: 0, background: '#111113',
        borderRight: '1px solid rgba(255,255,255,0.07)',
        display: 'flex', flexDirection: 'column',
        position: 'sticky', top: 0, height: '100vh', overflowY: 'auto',
      }}>
        {/* Logo */}
        <div style={{ padding: '28px 24px 20px', borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
          <img src="1_5058098532557259934/PNG/VV/Asset 1@4x.png" alt="PeakForm Bio"
            style={{ height: 110, marginBottom: 20 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
              width: 36, height: 36, borderRadius: '50%', background: '#0066cc',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: '#fff', fontSize: 14, fontWeight: 700, flexShrink: 0,
            }}>{userData.name.split(' ').map(n => n[0]).join('')}</div>
            <div>
              <p style={{ fontSize: 14, fontWeight: 600, color: '#f5f5f7', lineHeight: 1.2 }}>{userData.name}</p>
              <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>{userData.email}</p>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{ padding: '16px 12px', flex: 1 }}>
          {tabs.map(t => {
            const hasUnread = unread[t.id] && unread[t.id].length > 0;
            return (
              <button key={t.id} onClick={() => switchTab(t.id)}
                style={{
                  width: '100%', display: 'flex', alignItems: 'center', gap: 12,
                  padding: '11px 14px', borderRadius: 10, border: 'none', cursor: 'pointer',
                  fontFamily: 'inherit', fontSize: 14, fontWeight: activeTab === t.id ? 600 : 400,
                  textAlign: 'left', marginBottom: 2, transition: 'all 0.12s',
                  background: activeTab === t.id ? 'rgba(41,151,255,0.12)' : 'transparent',
                  color: activeTab === t.id ? '#2997ff' : 'rgba(255,255,255,0.75)',
                }}>
                <span style={{ opacity: activeTab === t.id ? 1 : 0.5 }}>{t.icon}</span>
                <span style={{ flex: 1 }}>{t.label}</span>
                {hasUnread && (
                  <span title="Updated" style={{
                    width: 8, height: 8, borderRadius: '50%', background: '#ff453a',
                    boxShadow: '0 0 0 3px rgba(255,69,58,0.18)', flexShrink: 0,
                  }} />
                )}
              </button>
            );
          })}
        </nav>

        {/* Logout */}
        <div style={{ padding: '16px 12px', borderTop: '1px solid rgba(255,255,255,0.07)' }}>
          <button onClick={onLogout}
            style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 14px', borderRadius: 10, border: 'none', cursor: 'pointer',
              fontFamily: 'inherit', fontSize: 14, color: 'rgba(255,255,255,0.45)',
              background: 'transparent', transition: 'all 0.12s',
            }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.06)'}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}
          >
            {icons.logout} Sign out
          </button>
        </div>
      </aside>

      {/* Mobile tab bar */}
      <div className="mobile-tabs" style={{
        display: 'none', position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100,
        background: 'rgba(10,10,10,0.95)', backdropFilter: 'blur(12px)',
        borderTop: '1px solid rgba(255,255,255,0.08)',
        padding: '8px 4px',
      }}>
        {tabs.map(t => {
          const hasUnread = unread[t.id] && unread[t.id].length > 0;
          return (
            <button key={t.id} onClick={() => switchTab(t.id)}
              style={{
                flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                background: 'none', border: 'none', cursor: 'pointer', padding: '6px 2px',
                color: activeTab === t.id ? '#2997ff' : 'rgba(255,255,255,0.35)',
                fontFamily: 'inherit', position: 'relative',
              }}>
              {t.icon}
              {hasUnread && (
                <span style={{
                  position: 'absolute', top: 2, right: '50%', marginRight: -16,
                  width: 7, height: 7, borderRadius: '50%', background: '#ff453a',
                  boxShadow: '0 0 0 2px #0a0a0a',
                }} />
              )}
              <span style={{ fontSize: 9, fontWeight: activeTab === t.id ? 600 : 400 }}>
                {t.label.split(' ')[0]}
              </span>
            </button>
          );
        })}
      </div>

      {/* Main content */}
      <main style={{ flex: 1, padding: '48px 40px', maxWidth: 960, paddingBottom: 80, background: '#0a0a0a' }}>
        {/* Onboarding reminder banner */}
        {showOnboardingReminder && (
          <div style={{
            background: 'rgba(0,102,204,0.12)',
            border: '1px solid rgba(0,102,204,0.4)',
            borderRadius: 12,
            padding: '14px 18px',
            marginBottom: 24,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            gap: 16,
            flexWrap: 'wrap',
          }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600, color: '#f5f5f7', marginBottom: 2 }}>
                Finish setting up your profile
              </div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)' }}>
                Your specialist needs your intake info before they can build a personalized plan. Takes about 3 minutes.
              </div>
            </div>
            <button onClick={resumeOnboarding} style={{
              background: '#0066cc',
              border: 'none',
              borderRadius: 8,
              color: '#fff',
              fontSize: 13,
              fontWeight: 500,
              padding: '9px 16px',
              cursor: 'pointer',
              whiteSpace: 'nowrap',
            }}>Complete now</button>
          </div>
        )}

        {/* Top bar */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 40 }}>
          <div>
            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', letterSpacing: '-0.12px' }}>
              {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
            </p>
            <h1 style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7', letterSpacing: '-0.025em' }}>
              Welcome back, {userData.name.split(' ')[0]}.
            </h1>
          </div>
        </div>

        {activeTab === 'order'     && <OrderForm userData={userData} onOrderPlaced={addOrder} />}
        {activeTab === 'history'   && <PurchaseHistory orders={userData.orders} />}
        {activeTab === 'nutrition' && (userData.nutrition
          ? <NutritionPlan plan={userData.nutrition} userId={userId} />
          : <EmptyState title="Nutrition Plan" message="Your nutrition plan will appear here once your specialist sets it up." />)}
        {activeTab === 'workout'   && (userData.workout
          ? <WorkoutPlan plan={userData.workout} />
          : <EmptyState title="Workout Plan" message="Your workout plan will appear here once your specialist sets it up." />)}
        {activeTab === 'weighin'   && <WeighIn sb={sb} userId={userId} />}
        {activeTab === 'blood'     && <BloodWork userId={userId} files={userData.bloodwork} onUpload={addFile} />}
        {activeTab === 'peptides'  && (window.PeptideDatabase ? <window.PeptideDatabase /> : <EmptyState title="Peptide Library" message="The peptide library is loading." />)}
        {activeTab === 'calculator' && (window.ReconstitutionCalculator ? <window.ReconstitutionCalculator /> : <EmptyState title="Reconstitution Calculator" message="The calculator is loading." />)}
      </main>
    </div>
  );
};

// ─── Empty State ──────────────────────────────────────────────────────────────
const EmptyState = ({ title, message }) => (
  <div className="fade-in">
    <h2 style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.025em', marginBottom: 6 }}>{title}</h2>
    <div className="card" style={{ padding: 60, textAlign: 'center' }}>
      <div style={{
        width: 56, height: 56, borderRadius: '50%', background: 'rgba(0,102,204,0.12)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        margin: '0 auto 18px',
      }}>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="#2997ff" strokeWidth="1.6"/>
          <path d="M11 7v4M11 14.5v.5" stroke="#2997ff" strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
      </div>
      <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.55)', maxWidth: 380, margin: '0 auto', lineHeight: 1.5 }}>{message}</p>
    </div>
  </div>
);

// ─── App ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [userId, setUserId] = React.useState(null);
  const [checking, setChecking] = React.useState(true);
  const [ageVerified, setAgeVerified] = React.useState(
    () => window.ageVerification ? window.ageVerification.isVerified() : false
  );
  const [ageBlocked, setAgeBlocked] = React.useState(false);

  // Restore session on mount + listen for auth changes
  React.useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      if (data?.session?.user) setUserId(data.session.user.id);
      setChecking(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setUserId(session?.user?.id || null);
    });
    return () => subscription?.unsubscribe();
  }, []);

  const logout = async () => {
    await sb.auth.signOut();
    setUserId(null);
  };

  if (checking) {
    return <div style={{ minHeight: '100vh', background: '#0a0a0a', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.4)' }}>Loading…</div>;
  }

  // Hard-block: user declined the age gate. Show a permanent denial screen.
  if (ageBlocked) {
    return (
      <div style={{
        minHeight: '100vh', background: '#0a0a0a', display: 'flex',
        flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        gap: 16, color: 'rgba(255,255,255,0.7)', textAlign: 'center', padding: 24,
      }}>
        <div style={{ fontSize: 22, fontWeight: 600, color: '#f5f5f7' }}>Access not permitted</div>
        <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', maxWidth: 360, lineHeight: 1.6 }}>
          You must affirm the age and research-use requirements to access this portal.
        </div>
        <button className="btn-ghost" onClick={() => setAgeBlocked(false)} style={{ marginTop: 8 }}>
          Try again
        </button>
      </div>
    );
  }

  // Render the portal/login first; overlay the gateway on top until verified.
  const main = userId
    ? <Portal userId={userId} onLogout={logout} />
    : <LoginScreen onLogin={setUserId} />;

  return (
    <React.Fragment>
      {main}
      {!ageVerified && window.AgeGateway && (
        <window.AgeGateway
          onAccept={() => setAgeVerified(true)}
          onDecline={() => setAgeBlocked(true)}
        />
      )}
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
